        else cursor = 'default';
      }

      canvas.style.cursor = cursor;
    }

    function updateEndpointFromPointer(e) {
      const o = state.objects.find(x => x.id === state.resizingObjectId);
      if (!o) return;
      let p = screenToWorld(e);
      const fixed = state.resizeEndpointIndex === 1 ? {x:o.x2,y:o.y2} : {x:o.x1,y:o.y1};
      if (e.shiftKey) p = constrainToAngle(fixed, p, 45);
      if (o.type === 'wall') p = snapWallEndpoint(p);
      if (state.resizeEndpointIndex === 1) { o.x1 = p.x; o.y1 = p.y; }
      else { o.x2 = p.x; o.y2 = p.y; }
    }

    function updateBoxResizeFromPointer(e) {
      const o = state.objects.find(x => x.id === state.resizingObjectId);
      if (!o || !isResizableBoxObject(o)) return;
      const handle = state.resizeBoxHandle;
      if (!handle) return;
      const original = state.dragOriginals && state.dragOriginals.get(o.id) ? state.dragOriginals.get(o.id) : o;
      const b = getBoxBounds(original);
      let left = b.left, right = b.right, top = b.top, bottom = b.bottom;
      let p = screenToWorld(e);

      if (handle.length === 2 && e.shiftKey) {
        const fixed = {
          x: handle.includes('w') ? b.right : b.left,
          y: handle.includes('n') ? b.bottom : b.top
        };
        const aspect = Math.max(0.0001, Math.abs((b.right - b.left) / Math.max(0.0001, b.bottom - b.top)));
        let dx = p.x - fixed.x;
        let dy = p.y - fixed.y;
        let w = Math.abs(dx);
        let h = Math.abs(dy);
        if (w / Math.max(0.0001, h) > aspect) w = h * aspect;
        else h = w / aspect;
        p = {
          x: fixed.x + Math.sign(dx || (handle.includes('e') ? 1 : -1)) * w,
          y: fixed.y + Math.sign(dy || (handle.includes('s') ? 1 : -1)) * h
        };
      }

      if (handle.includes('w')) left = p.x;
      if (handle.includes('e')) right = p.x;
      if (handle.includes('n')) top = p.y;
      if (handle.includes('s')) bottom = p.y;

      const minSize = 1;
      if (Math.abs(right - left) < minSize) right = left + (right >= left ? minSize : -minSize);
      if (Math.abs(bottom - top) < minSize) bottom = top + (bottom >= top ? minSize : -minSize);

      o.x1 = left;
      o.y1 = top;
      o.x2 = right;
      o.y2 = bottom;
    }
    function updateAreaVertexFromPointer(e) {
      const o = state.objects.find(x => x.id === state.resizingObjectId);
      if (!o || o.type !== 'area') return;
      const index = state.resizeAreaVertexIndex;
      const pts = Array.isArray(o.points) ? o.points : [];
      if (!Number.isInteger(index) || index < 0 || index >= pts.length) return;
      const p = screenToWorld(e);
      pts[index].x = p.x;
      pts[index].y = p.y;
    }
    function boxIntersectsObject(box,o){ const b=getObjectBox(o); return !(b.x>box.x+box.w||b.x+b.w<box.x||b.y>box.y+box.h||b.y+b.h<box.y); }

    function expandSelectionWithGroup(id){ const o=state.objects.find(x=>x.id===id); if(!o||!o.groupId)return [id]; return state.objects.filter(x=>x.groupId===o.groupId).map(x=>x.id); }

    function captureSelectedOriginals(){ const m=new Map(); state.objects.forEach(o=>{ if(state.selectedIds.includes(o.id))m.set(o.id,JSON.parse(JSON.stringify(o))); }); return m; }
    function restoreDragOriginals(){ if(!state.dragOriginals)return; state.objects=state.objects.map(o=>state.dragOriginals.has(o.id)?JSON.parse(JSON.stringify(state.dragOriginals.get(o.id))):o); }
    function moveObject(o,dx,dy){ if(o.type==='text'){o.x+=dx;o.y+=dy;} else if(o.type==='erase'||o.type==='area'){(o.points||[]).forEach(p=>{p.x+=dx;p.y+=dy;});} else {o.x1+=dx;o.y1+=dy;o.x2+=dx;o.y2+=dy;} }

    const activePointers = new Map();
    const touchInteraction = {
      primaryId: null,
      startClientX: 0,
      startClientY: 0,
      lastClientX: 0,
      lastClientY: 0,
      panStarted: false,
      emptyPanCandidate: false,
      longPressTimer: null,
      pinchLastDistance: 0,
      pinchLastCenter: null,
      pinchMode: false,
      ignoreSyntheticMouseUntil: 0,
      multiSelectMode: false
    };
    const TOUCH_MOVE_THRESHOLD = 6;
    const TOUCH_LONG_PRESS_MS = 380;

    function getCanvasWrap() {
      return document.querySelector('.canvas-wrap');
    }

    function clearTouchLongPress() {
      if (touchInteraction.longPressTimer) {
        clearTimeout(touchInteraction.longPressTimer);
        touchInteraction.longPressTimer = null;
      }
    }

    function updateTouchPointer(e) {
      if (!activePointers.has(e.pointerId)) return;
      activePointers.set(e.pointerId, { x: e.clientX, y: e.clientY, pointerType: e.pointerType });
    }

    function getTouchPointers() {
      return [...activePointers.values()].filter(p => p.pointerType === 'touch');
    }

    function getTwoTouchInfo() {
      const touches = getTouchPointers();
      if (touches.length < 2) return null;
      const p1 = touches[0], p2 = touches[1];
      const distance = Math.hypot(p2.x - p1.x, p2.y - p1.y);
      const center = { x: (p1.x + p2.x) / 2, y: (p1.y + p2.y) / 2 };
      return { distance, center };
    }

    function resetTransientInteraction(restore = false) {
      if (restore) {
        if (state.dragging || state.resizingEndpoint || state.resizingBox || state.resizingAreaVertex) restoreDragOriginals();
        if (state.erasing) {
          const last = state.objects[state.objects.length - 1];
          if (last && last.type === 'erase') state.objects.pop();
        }
      }
      state.drawing = false;
      state.areaDrawing = false;
      state.areaPoints = [];
      state.areaPreview = null;
      state.dragging = false;
      state.erasing = false;
      state.boxSelecting = false;
      state.resizingEndpoint = false;
      state.resizingBox = false;
      state.resizingAreaVertex = false;
      state.resizeEndpointIndex = null;
      state.resizeBoxHandle = null;
      state.resizeAreaVertexIndex = null;
      state.resizingObjectId = null;
      state.dragHistorySaved = false;
      state.resizeHistorySaved = false;
      state.start = null;
      state.current = null;
      state.dragStartRaw = null;
      state.dragOriginals = null;
      state.selectionBox = null;
      draw();
    }

    function beginTouchLongPress(found) {
      clearTouchLongPress();
      if (!found || state.tool !== 'select') return;
      touchInteraction.longPressTimer = setTimeout(() => {
        touchInteraction.longPressTimer = null;
        if (touchInteraction.primaryId === null || touchInteraction.pinchMode) return;
        touchInteraction.multiSelectMode = true;
        const ids = expandSelectionWithGroup(found.id);
        const set = new Set(state.selectedIds);
        ids.forEach(id => set.add(id));
        state.selectedIds = [...set];
        state.dragOriginals = captureSelectedOriginals();
        draw();
        updateCursor();
      }, TOUCH_LONG_PRESS_MS);
    }

    function isTouchLike(e) {
      return e.pointerType === 'touch';
    }

    function handlePointerDown(e) {
      if (e.pointerType === 'mouse' && Date.now() < touchInteraction.ignoreSyntheticMouseUntil) return;
      if (e.button !== undefined && e.button !== 0) return;
      activePointers.set(e.pointerId, { x: e.clientX, y: e.clientY, pointerType: e.pointerType });
      try { canvas.setPointerCapture(e.pointerId); } catch (err) {}

      if (isTouchLike(e)) {
        touchInteraction.ignoreSyntheticMouseUntil = Date.now() + 700;
        e.preventDefault();
        if (touchInteraction.primaryId === null) {
          touchInteraction.primaryId = e.pointerId;
          touchInteraction.startClientX = e.clientX;
          touchInteraction.startClientY = e.clientY;
          touchInteraction.lastClientX = e.clientX;
          touchInteraction.lastClientY = e.clientY;
          touchInteraction.panStarted = false;
          touchInteraction.emptyPanCandidate = false;
        }
        if (getTouchPointers().length >= 2) {
          clearTouchLongPress();
          resetTransientInteraction(true);
          const info = getTwoTouchInfo();
          touchInteraction.pinchMode = true;
          touchInteraction.pinchLastDistance = info ? info.distance : 0;
          touchInteraction.pinchLastCenter = info ? info.center : null;
          return;
        }
      }

      let p = screenToWorld(e), raw = rawScreenToWorld(e);
      updateCursor(e);
      if(state.tool==='wall') p = snapWallEndpoint(p);
      startCanvasInteraction(e, p, raw);
    }

    function startCanvasInteraction(e, p, raw) {
      if(state.tool==='area'){
        handleAreaPointerDown(e, p);
        updateCursor(e);
        return;
      }
      if(state.tool==='text'){
        addObject({type:'text',x:p.x,y:p.y,text:els.textInput.value.trim()||'文字',layer:'text'});
        updateCursor(e);
        return;
      }
      if(state.tool==='eraser'){
        saveHistory();
        state.erasing=true;
        state.current=raw;
        state.objects.push({id:uid(),type:'erase',points:[raw],width:Number(els.eraserWidth.value)||22,layer:'annotations'});
        draw();
        updateCursor(e);
        return;
      }
      if(state.tool==='select'){
        const resizeHit = hitResizeHandle(raw);
        if (resizeHit && !isTouchLike(e)) {
          state.resizingEndpoint = resizeHit.kind === 'line';
          state.resizingBox = resizeHit.kind === 'box';
          state.resizingAreaVertex = resizeHit.kind === 'areaVertex';
          state.resizeHistorySaved = false;
          state.resizingObjectId = resizeHit.object.id;
          state.resizeEndpointIndex = resizeHit.index || null;
          state.resizeBoxHandle = resizeHit.handle || null;
          state.resizeAreaVertexIndex = resizeHit.kind === 'areaVertex' ? resizeHit.index : null;
          state.dragOriginals = captureSelectedOriginals();
          draw();
          updateCursor(e);
          return;
        }
        const found=hitTest(raw);
        if(found){
          let ids=expandSelectionWithGroup(found.id);
          if(e.shiftKey || (isTouchLike(e) && touchInteraction.multiSelectMode)){
            const set=new Set(state.selectedIds);
            ids.forEach(id=>set.has(id)?set.delete(id):set.add(id));
            state.selectedIds=[...set];
          }
          else if(!state.selectedIds.includes(found.id)) state.selectedIds=ids;
          beginTouchLongPress(isTouchLike(e) ? found : null);
          if(state.selectedIds.length){
            state.dragging=true;
            state.dragHistorySaved=false;
            state.dragStartRaw=raw;
            state.dragOriginals=captureSelectedOriginals();
          }
        } else {
          if (isTouchLike(e)) {
            clearTouchLongPress();
            touchInteraction.emptyPanCandidate = true;
            touchInteraction.panStarted = false;
          } else {
            state.selectedIds=[];
            state.boxSelecting=true;
            state.selectionBox={x1:raw.x,y1:raw.y,x2:raw.x,y2:raw.y};
          }
        }
        draw(); updateCursor(e); return;
      }
      state.drawing=true; state.start=p; state.current=p; draw(); updateCursor(e);
    }

    function handlePointerMove(e) {
      if (e.pointerType === 'mouse' && Date.now() < touchInteraction.ignoreSyntheticMouseUntil) return;
      updateTouchPointer(e);
      if (isTouchLike(e)) {
        e.preventDefault();
        if (touchInteraction.pinchMode || getTouchPointers().length >= 2) {
          const info = getTwoTouchInfo();
          if (!info) return;
          const wrap = getCanvasWrap();
          if (touchInteraction.pinchLastCenter) {
            const dx = info.center.x - touchInteraction.pinchLastCenter.x;
            const dy = info.center.y - touchInteraction.pinchLastCenter.y;
            wrap.scrollLeft -= dx;
            wrap.scrollTop -= dy;
          }
          if (touchInteraction.pinchLastDistance > 0 && info.distance > 0) {
            const factor = Math.max(0.85, Math.min(1.18, info.distance / touchInteraction.pinchLastDistance));
            setZoom(state.zoom * factor, info.center.x, info.center.y);
          }
          touchInteraction.pinchMode = true;
          touchInteraction.pinchLastDistance = info.distance;
          touchInteraction.pinchLastCenter = info.center;
          return;
        }
        if (touchInteraction.primaryId !== null && e.pointerId === touchInteraction.primaryId) {
          const moved = Math.hypot(e.clientX - touchInteraction.startClientX, e.clientY - touchInteraction.startClientY);
          if (moved > TOUCH_MOVE_THRESHOLD) clearTouchLongPress();
          if (touchInteraction.emptyPanCandidate) {
            const dx = e.clientX - touchInteraction.lastClientX;
            const dy = e.clientY - touchInteraction.lastClientY;
            if (moved > TOUCH_MOVE_THRESHOLD) touchInteraction.panStarted = true;
            if (touchInteraction.panStarted) {
              const wrap = getCanvasWrap();
              wrap.scrollLeft -= dx;
              wrap.scrollTop -= dy;
              touchInteraction.lastClientX = e.clientX;
              touchInteraction.lastClientY = e.clientY;
              return;
            }
          }
        }
      }

      let p=screenToWorld(e), raw=rawScreenToWorld(e);
      updateCursor(e);
      if(state.tool==='area' && state.areaDrawing){ state.areaPreview=p; draw(); updateCursor(e); return; }
      if(state.drawing && state.start && ['line','arrow','wall','dimension','door','window'].includes(state.tool) && e.shiftKey) {
        p = constrainToAngle(state.start, p, 45);
      }
      if(state.tool==='wall') p = snapWallEndpoint(p);
      if(state.resizingEndpoint || state.resizingBox || state.resizingAreaVertex){
        if(!state.resizeHistorySaved){ saveHistory(); state.resizeHistorySaved = true; }
        if (state.resizingBox) updateBoxResizeFromPointer(e);
        else if (state.resizingAreaVertex) updateAreaVertexFromPointer(e);
        else updateEndpointFromPointer(e);
        draw(); updateCursor(e); return;
      }
      if(state.erasing){ state.current=raw; const er=state.objects[state.objects.length-1]; if(er&&er.type==='erase')er.points.push(raw); draw(); updateCursor(e); return; }
      if(state.boxSelecting&&state.selectionBox){ state.selectionBox.x2=raw.x; state.selectionBox.y2=raw.y; const box=normalizeBox(state.selectionBox.x1,state.selectionBox.y1,state.selectionBox.x2,state.selectionBox.y2); state.selectedIds=state.objects.filter(o=>o.type!=='erase'&&isLayerVisible(o)&&boxIntersectsObject(box,o)).map(o=>o.id); draw(); updateCursor(e); return; }
      if(state.dragging&&state.selectedIds.length){
        let dx=raw.x-state.dragStartRaw.x,dy=raw.y-state.dragStartRaw.y;
        if(els.snapMode.value==='on'){ const g=Number(els.gridSize.value)||20; dx=Math.round(dx/g)*g; dy=Math.round(dy/g)*g; }
        if(dx !== 0 || dy !== 0){
          if(!state.dragHistorySaved){ saveHistory(); state.dragHistorySaved = true; }
          restoreDragOriginals();
          state.objects.forEach(o=>{ if(state.selectedIds.includes(o.id))moveObject(o,dx,dy); });
          draw();
        }
        updateCursor(e); return;
      }
      if(state.drawing){ state.current=p; draw(); updateCursor(e); }
    }

    function handlePointerUp(e) {
      if (e.pointerType === 'mouse' && Date.now() < touchInteraction.ignoreSyntheticMouseUntil) return;
      const wasTouch = isTouchLike(e);
      if (wasTouch) e.preventDefault();
      clearTouchLongPress();
      activePointers.delete(e.pointerId);
      try { canvas.releasePointerCapture(e.pointerId); } catch (err) {}

      if (wasTouch) {
        if (touchInteraction.pinchMode) {
          if (getTouchPointers().length < 2) {
            touchInteraction.pinchMode = false;
            touchInteraction.pinchLastDistance = 0;
            touchInteraction.pinchLastCenter = null;
          }
          if (e.pointerId === touchInteraction.primaryId) touchInteraction.primaryId = null;
          updateCursor(e);
          return;
        }
        if (touchInteraction.emptyPanCandidate) {
          if (!touchInteraction.panStarted) {
            state.selectedIds = [];
            touchInteraction.multiSelectMode = false;
            draw();
          }
          touchInteraction.emptyPanCandidate = false;
          touchInteraction.panStarted = false;
          touchInteraction.primaryId = null;
          updateCursor(e);
          return;
        }
        touchInteraction.primaryId = null;
      }
      finishPointer(e);
    }

    function handlePointerCancel(e) {
      clearTouchLongPress();
      activePointers.delete(e.pointerId);
      try { canvas.releasePointerCapture(e.pointerId); } catch (err) {}
      if (isTouchLike(e)) {
        resetTransientInteraction(true);
        touchInteraction.primaryId = null;
        touchInteraction.emptyPanCandidate = false;
        touchInteraction.panStarted = false;
        touchInteraction.pinchMode = false;
        touchInteraction.pinchLastDistance = 0;
        touchInteraction.pinchLastCenter = null;
        updateCursor(e);
        return;
      }
      finishPointer(e);
    }

    canvas.addEventListener('pointerdown', handlePointerDown);
    canvas.addEventListener('pointermove', handlePointerMove);
    canvas.addEventListener('pointerup', handlePointerUp);
    canvas.addEventListener('pointercancel', handlePointerCancel);
    canvas.addEventListener('lostpointercapture', e => {
      if (activePointers.has(e.pointerId)) handlePointerCancel(e);
    });
    canvas.addEventListener('dblclick', e=>{ if(state.tool==='area'){ e.preventDefault(); completeAreaDraft(); return; } const t=hitText(rawScreenToWorld(e)); if(t){ e.preventDefault(); editTextObject(t); } });

    function finishPointer(e){
      if(state.resizingEndpoint || state.resizingBox || state.resizingAreaVertex){
        state.resizingEndpoint=false;
        state.resizingBox=false;
        state.resizingAreaVertex=false;
        state.resizingObjectId=null;
        state.resizeEndpointIndex=null;
        state.resizeBoxHandle=null;
        state.resizeAreaVertexIndex=null;
        state.dragOriginals=null;
        state.resizeHistorySaved=false;
        draw();
        return;
      }
      if(state.erasing){ state.erasing=false; state.current=null; draw(); updateCursor(e); return; }
      if(state.boxSelecting){ state.boxSelecting=false; state.selectionBox=null; draw(); updateCursor(e); return; }
      if(!state.drawing){ state.dragging=false; state.dragHistorySaved=false; state.dragStartRaw=null; state.dragOriginals=null; updateCursor(e); return; }
      let p=screenToWorld(e);
      if(['line','arrow','wall','dimension','door','window'].includes(state.tool) && e.shiftKey) p = constrainToAngle(state.start, p, 45);
      if(state.tool==='wall') p = snapWallEndpoint(p);
      if(Math.hypot(p.x-state.start.x,p.y-state.start.y)>3) addObject(buildShapeFromPoints(state.tool,state.start,p,false));
      state.drawing=false; state.start=null; state.current=null; draw(); updateCursor(e);
    }

    function editTextObject(o){ const v=prompt('编辑文字标签：',o.text||''); if(v===null)return; saveHistory(); o.text=v.trim()||'文字'; state.selectedIds=[o.id]; draw(); }

    function setTool(tool) {
      if (tool !== state.tool) cancelAreaDraft(false);
      document.querySelectorAll('[data-tool]').forEach(b=>b.classList.toggle('active', b.dataset.tool === tool));
      state.tool = tool;
      if (tool !== 'select') state.selectedIds = [];
      draw();
      updateCursor();
    }
    document.querySelectorAll('[data-tool]').forEach(btn=>btn.addEventListener('click',()=>setTool(btn.dataset.tool)));

    function deleteSelected(){ if(!state.selectedIds.length)return; saveHistory(); state.objects=state.objects.filter(o=>!state.selectedIds.includes(o.id)); state.selectedIds=[]; draw(); }
    function copySelected(){ state.clipboard=state.objects.filter(o=>state.selectedIds.includes(o.id)).map(o=>JSON.parse(JSON.stringify(o))); }
    function pasteClipboard(){ if(!state.clipboard.length)return; saveHistory(); const newIds=[]; const groupMap={}; state.clipboard.forEach(src=>{ const o=JSON.parse(JSON.stringify(src)); const oldGroup=o.groupId; o.id=uid(); if(oldGroup){ if(!groupMap[oldGroup])groupMap[oldGroup]=uid(); o.groupId=groupMap[oldGroup]; } moveObject(o,20,20); state.objects.push(o); newIds.push(o.id); }); state.selectedIds=newIds; draw(); }


    function syncSegmentedControls(targetId) {
      const groups = targetId
        ? document.querySelectorAll(`[data-segment-target="${targetId}"]`)
        : document.querySelectorAll('[data-segment-target]');
      groups.forEach(group => {
        const el = document.getElementById(group.dataset.segmentTarget);
        if (!el) return;
        group.querySelectorAll('button[data-value]').forEach(btn => {
          btn.classList.toggle('active', btn.dataset.value === el.value);
        });
      });
    }


    function updateExportOptions(shouldSync = true) {
      if (!els.exportFormat || !els.exportBackground) return;
      const format = els.exportFormat.value;
      const transparentAllowed = format === 'png';
      const pdfVectorMode = format === 'pdf';
      if (!transparentAllowed && els.exportBackground.value === 'transparent') {
        els.exportBackground.value = 'white';
      }
      document.querySelectorAll('[data-segment-target="exportBackground"] button[data-value="transparent"]').forEach(btn => {
        btn.disabled = !transparentAllowed;
        btn.title = transparentAllowed ? '导出透明背景 PNG' : '透明背景仅支持 PNG';
      });
      document.querySelectorAll('[data-segment-target="exportScale"] button[data-value]').forEach(btn => {
        btn.disabled = pdfVectorMode;
        if (pdfVectorMode) {
          btn.title = 'PDF为矢量导出，不使用倍率';
        } else if (btn.dataset.value === '3') {
          btn.title = '3x（打印）';
        } else {
          btn.title = '';
        }
      });
      if (els.exportScale) els.exportScale.disabled = pdfVectorMode;
      if (shouldSync) {
        syncSegmentedControls('exportBackground');
        syncSegmentedControls('exportScale');
      }
    }

    document.querySelectorAll('[data-segment-target]').forEach(group => {
      group.addEventListener('click', e => {
        const btn = e.target.closest('button[data-value]');
        if (!btn) return;
        const el = document.getElementById(group.dataset.segmentTarget);
        if (!el) return;
        el.value = btn.dataset.value;
        syncSegmentedControls(group.dataset.segmentTarget);
        el.dispatchEvent(new Event('input', { bubbles: true }));
        el.dispatchEvent(new Event('change', { bubbles: true }));
        if (group.dataset.segmentTarget === 'exportFormat') updateExportOptions();
      });
    });

    function applyStyle(){
      if(!state.selectedIds.length){
        alert('请先选择一个或多个对象');
        return;
      }
      saveHistory();

      const color = els.strokeColor.value;
      const lineWidth = Number(els.lineWidth.value) || 2;
      const wallThickness = Number(els.wallThickness.value) || 10;
      const wallStyle = els.wallStyle.value || 'hollow';
      const fontSize = Number(els.fontSize.value) || 20;
      const arrowMode = els.arrowMode.value || 'end';
      const arrowSize = Number(els.arrowSize.value) || 14;
      const dimensionLabelMode = els.dimensionLabelMode.value || 'inline';
      const layer = els.layerSelect.value;
      const openingThicknessMode = els.openingThicknessMode.value || 'linear';
      const openingUseWallThickness = openingThicknessMode === 'wall';
      const areaOpacity = getDefaultAreaFillOpacity();

      state.objects.forEach(o=>{
        if(!state.selectedIds.includes(o.id) || o.type==='erase') return;

        // 通用属性：所有可见对象都允许后续改颜色、图层
        o.color = color;
        if(layer) o.layer = layer;

        // 线宽：适用于所有线性/轮廓对象，包括墙体、线、箭头、矩形、椭圆、标尺、门窗
        if(['wall','line','arrow','rect','ellipse','dimension','door','window','area'].includes(o.type)) {
          o.lineWidth = lineWidth;
        }

        // 墙厚：墙体本身使用墙厚；门窗对象使用墙厚控制开口白色遮挡线宽度
        if(o.type === 'wall') {
          o.wallThickness = wallThickness;
          o.wallStyle = wallStyle;
        }
        if(['door','window'].includes(o.type)) {
          o.openingThicknessMode = openingThicknessMode;
          o.openingUseWallThickness = openingUseWallThickness;
          if(openingUseWallThickness) o.wallThickness = wallThickness;
        }

        // 字号：文字和标尺文字都可修改
        if(['text','dimension'].includes(o.type)) {
          o.fontSize = fontSize;
        }

    let wheelZoomAccumulator = 0;
    let wheelZoomResetTimer = null;
    document.querySelector('.canvas-wrap').addEventListener('wheel', e => {
      if (!(e.ctrlKey || e.metaKey)) return;
      e.preventDefault();

      // 以“滚轮一格≈10%”为目标：累积小幅滚轮事件，达到阈值后只执行一次缩放，避免一下跳到 300% 或 49%。
      const unit = e.deltaMode === 1 ? 3 : e.deltaMode === 2 ? 100 : 1;
      wheelZoomAccumulator += e.deltaY * unit;

      clearTimeout(wheelZoomResetTimer);
      wheelZoomResetTimer = setTimeout(() => { wheelZoomAccumulator = 0; }, 220);

      const threshold = 90;
      if (Math.abs(wheelZoomAccumulator) < threshold) return;

      const direction = wheelZoomAccumulator > 0 ? 1 : -1;
      wheelZoomAccumulator = 0;
      const factor = direction < 0 ? 1.10 : 1 / 1.10;
      setZoom(state.zoom * factor, e.clientX, e.clientY);
    }, { passive: false });

    function renderExportCanvas(targetW, targetH, backgroundMode = 'white'){
      const out = document.createElement('canvas');
      out.width = Math.max(1, Math.round(targetW));
      out.height = Math.max(1, Math.round(targetH));
      const c = out.getContext('2d');

      if (backgroundMode !== 'transparent') {
        c.fillStyle = '#ffffff';
        c.fillRect(0, 0, state.pageW, state.pageH);
      }
      drawBackgroundImage(c);
      drawCanvasRenderItems(c, buildRenderItems(state.objects));
      c.restore();
      return out;
    }

    function getPdfPaperInfo(){
      const preset = els.pagePreset.value;
      const orientation = els.pageOrientation.value;
      const map = {
        letter: { name: 'letter', portraitW: 8.5, portraitH: 11 },
        a4: { name: 'A4', portraitW: 8.27, portraitH: 11.69 },
        a3: { name: 'A3', portraitW: 11.69, portraitH: 16.54 }
      };
      const base = map[preset];
      if(!base){
        const shortSide = 8.5;
        const longSide = Math.max(shortSide, shortSide * Math.max(state.pageW, state.pageH) / Math.max(1, Math.min(state.pageW, state.pageH)));
        const w = state.pageW >= state.pageH ? longSide : shortSide;
        const h = state.pageW >= state.pageH ? shortSide : longSide;
        return { cssSize: `${w.toFixed(3)}in ${h.toFixed(3)}in`, wIn: w, hIn: h, label: 'custom' };
      }
      const portrait = orientation === 'portrait';
      const wIn = portrait ? base.portraitW : base.portraitH;
      const hIn = portrait ? base.portraitH : base.portraitW;
      return { cssSize: `${base.name} ${orientation}`, wIn, hIn, label: `${base.name}-${orientation}` };
    }


    const PDF_TEXT_FONT_FAMILY = 'Arial, "Microsoft YaHei", "Noto Sans CJK SC", "PingFang SC", sans-serif';

    function svgNum(value){
      const n = Number(value);
      if(!Number.isFinite(n)) return '0';
      return String(Math.round(n * 1000) / 1000);
    }

    function escapeSvg(value){
      return String(value ?? '')
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;')
        .replace(/'/g, '&apos;');
    }

    // 旧版对象专属 SVG 绘制函数已移除；SVG/PDF 统一使用 renderItemsToSvg()。

    function buildExportSvg(backgroundMode = 'white'){
      const parts = [];
      parts.push(`<svg xmlns="http://www.w3.org/2000/svg" width="100%" height="100%" viewBox="0 0 ${svgNum(state.pageW)} ${svgNum(state.pageH)}" shape-rendering="geometricPrecision">`);
      if(backgroundMode !== 'transparent') {
        parts.push(`<rect x="0" y="0" width="${svgNum(state.pageW)}" height="${svgNum(state.pageH)}" fill="#ffffff" />`);
      }
      const bg = state.backgroundImage;
      if (bg && bg.dataUrl) {
        parts.push(`<image href="${escapeSvg(bg.dataUrl)}" x="${svgNum(bg.x || 0)}" y="${svgNum(bg.y || 0)}" width="${svgNum(bg.width || bg.naturalWidth)}" height="${svgNum(bg.height || bg.naturalHeight)}" opacity="${svgNum(getBackgroundOpacity())}" preserveAspectRatio="none" />`);
      }
      parts.push(renderItemsToSvg(buildRenderItems(state.objects)));
      parts.push('</svg>');
      return parts.join('');
    }

    async function openPdfPrintWindowFromSvg(svgMarkup, paper, title = 'floor-plan.pdf'){

        if(!win){ alert('浏览器阻止了导出窗口，请允许弹出窗口后再试'); return; }
        win.document.write(`<!doctype html><html><head><meta charset="UTF-8"><title>${escapeSvg(title)}</title><style>@page{size:${paper.cssSize};margin:0;}html,body{margin:0;padding:0;background:white;width:100%;height:100%;}body{-webkit-print-color-adjust:exact;print-color-adjust:exact;}svg{display:block;width:${paper.wIn}in;height:${paper.hIn}in;overflow:hidden;}text{font-family:${PDF_TEXT_FONT_FAMILY};}</style></head><body>${svgMarkup}<script>setTimeout(function(){ window.print(); }, 250);<\/script></body></html>`);
        win.document.close();
      }catch(err){
        alert('PDF矢量导出预览生成失败，请检查是否有异常对象或改用PNG/JPG导出');
      }

    function canvasToBlob(canvasElement, mime, quality = 0.95){
      return new Promise((resolve, reject)=>{
        if(!canvasElement.toBlob){
          try {
            const dataUrl = canvasElement.toDataURL(mime, quality);
            const byteString = atob(dataUrl.split(',')[1]);
            const ab = new ArrayBuffer(byteString.length);
            const ia = new Uint8Array(ab);
            for(let i=0;i<byteString.length;i++) ia[i] = byteString.charCodeAt(i);
            resolve(new Blob([ab], {type: mime}));
          } catch(err) { reject(err); }
          return;
        }
        canvasElement.toBlob(blob=>{
          if(blob) resolve(blob);
          else reject(new Error('导出图片失败'));
        }, mime, quality);
      });
    }

    function isSafariBrowser(){
      const ua = navigator.userAgent;
      return /Safari/i.test(ua) && !/Chrome|Chromium|CriOS|FxiOS|Edg/i.test(ua);
    }

    function downloadBlob(blob, filename){
      const url = URL.createObjectURL(blob);

      // Safari 在本地 file:// 页面下载 blob 时，容易生成 .download 并报“无法移动文件”。
      // JPG/PNG/JSON 在 Safari 下改为打开预览页，由用户手动保存，避免临时下载文件卡住。
      if(isSafariBrowser()){
        const win = window.open('', '_blank');
        if(win){
          const isImage = blob.type.startsWith('image/');
          const content = isImage
            ? `<img src="${url}" style="display:block;max-width:100%;height:auto;margin:18px auto;background:white;box-shadow:0 8px 24px rgba(0,0,0,.12);">`
            : `<p style="padding:18px">Safari 预览模式：请使用页面另存为。建议文件名：${filename}</p>`;
          win.document.write(`<!doctype html><html><head><meta charset="UTF-8"><title>${filename}</title><style>body{margin:0;background:#f3f4f6;font-family:Arial,"Microsoft YaHei",sans-serif;}header{position:sticky;top:0;background:#fff;border-bottom:1px solid #ddd;padding:10px 14px;font-size:13px;color:#374151;z-index:1;}</style></head><body><header>Safari 预览模式：请右键图片选择“将图像存储到‘下载’”，或使用“文件 > 存储为”。建议文件名：${filename}</header>${content}</body></html>`);
          win.document.close();
          setTimeout(()=>URL.revokeObjectURL(url), 10 * 60 * 1000);
          return;
        }
      }

      const link = document.createElement('a');
      link.href = url;
      link.download = filename;
      link.rel = 'noopener';
      link.style.display = 'none';
      document.body.appendChild(link);

      // 非 Safari：保持自动下载。延迟移除链接和释放 URL，避免大文件还没完成就失效。
      setTimeout(()=>{
        link.click();
        setTimeout(()=>link.remove(), 120000);
        setTimeout(()=>URL.revokeObjectURL(url), 180000);
      }, 0);
    }

    function normalizeBackgroundImage(bg) {

      return {
        dataUrl: bg.dataUrl,
        naturalWidth,
        naturalHeight,
        x: Number(bg.x) || 0,
        y: Number(bg.y) || 0,
        width: Math.max(1, Number(bg.width) || naturalWidth),
        height: Math.max(1, Number(bg.height) || naturalHeight),

        p.textContent = message;
        p.style.cssText = 'font-size:13px;line-height:1.6;color:#475569;margin-bottom:16px;white-space:pre-line;';
        const row = document.createElement('div');
        row.style.cssText = 'display:flex;gap:8px;justify-content:flex-end;flex-wrap:wrap;';
        choices.forEach(choice => {
          const btn = document.createElement('button');
          btn.type = 'button';
          btn.textContent = choice.label;
          btn.style.cssText = 'min-height:34px;border:1px solid #cbd5e1;background:#f8fafc;border-radius:9px;padding:7px 11px;cursor:pointer;font-size:13px;';
          if (choice.primary) btn.style.cssText += 'background:#1d4ed8;border-color:#1d4ed8;color:#fff;font-weight:700;';
          btn.addEventListener('click', () => { overlay.remove(); resolve(choice.value); });
          row.appendChild(btn);
        });
        box.appendChild(h); box.appendChild(p); box.appendChild(row); overlay.appendChild(box); document.body.appendChild(overlay);
      });
    }

    function readFileAsDataUrl(file) {
      return new Promise((resolve, reject) => {
        const reader = new FileReader();
        reader.onload = () => resolve(String(reader.result || ''));
        reader.onerror = () => reject(reader.error || new Error('读取文件失败'));
        reader.readAsDataURL(file);
      });
    }

    function loadImageFromDataUrl(dataUrl) {
      return new Promise((resolve, reject) => {
        const img = new Image();
        img.onload = () => resolve(img);
        img.onerror = () => reject(new Error('图片加载失败'));
        img.src = dataUrl;
      });
    }

    function imageToDataUrl(img, width, height, mime = 'image/jpeg', quality = 0.92) {
      const out = document.createElement('canvas');
      out.width = Math.max(1, Math.round(width));
      out.height = Math.max(1, Math.round(height));
      const c = out.getContext('2d');
      c.drawImage(img, 0, 0, out.width, out.height);
      return out.toDataURL(mime, quality);
    }

    async function prepareBackgroundImageFile(file) {
      let dataUrl = await readFileAsDataUrl(file);
      let img = await loadImageFromDataUrl(dataUrl);
      let w = img.naturalWidth || img.width;
      let h = img.naturalHeight || img.height;
      const maxSide = Math.max(w, h);
      const limit = 6000;
      if (maxSide > limit) {
        const choice = await showChoiceDialog(
          '底图尺寸较大',
          `当前图片尺寸为 ${w} × ${h} px，可能导致浏览器卡顿或导出失败。\n是否自动压缩到最长边 ${limit} px 后导入？`,
          [
            { label: '取消', value: 'cancel' },
            { label: '自动压缩导入', value: 'compress', primary: true }
          ]
        );
        if (choice !== 'compress') return null;
        const scale = limit / maxSide;
        w = Math.round(w * scale);
        h = Math.round(h * scale);
        const mime = file.type === 'image/png' ? 'image/png' : 'image/jpeg';
        dataUrl = imageToDataUrl(img, w, h, mime, mime === 'image/jpeg' ? 0.92 : undefined);
        img = await loadImageFromDataUrl(dataUrl);
      }
      return { dataUrl, img, width: w, height: h };
    }

    async function chooseBackgroundCanvasAction(imgW, imgH) {
      const largerW = imgW > state.pageW;
      const largerH = imgH > state.pageH;
      const smallerOrEqualW = imgW <= state.pageW;
      const smallerOrEqualH = imgH <= state.pageH;
      if (smallerOrEqualW && smallerOrEqualH) {
        return await showChoiceDialog(
          '底图小于当前画布',
          `底图尺寸为 ${imgW} × ${imgH} px，当前画布为 ${state.pageW} × ${state.pageH} px。`,
          [
            { label: '取消', value: 'cancel' },
            { label: '保持当前画布', value: 'keep' },
            { label: '调整为底图大小', value: 'image', primary: true }
          ]
        );
      }
      if (largerW && largerH) {
        return await showChoiceDialog(
          '底图大于当前画布',
          `底图尺寸为 ${imgW} × ${imgH} px，当前画布为 ${state.pageW} × ${state.pageH} px。\n建议扩展画布以完整显示底图。`,
          [
            { label: '取消', value: 'cancel' },
            { label: '扩展为底图大小', value: 'image', primary: true }
          ]
        );
      }
      return await showChoiceDialog(
        '底图一边超出当前画布',
        `底图尺寸为 ${imgW} × ${imgH} px，当前画布为 ${state.pageW} × ${state.pageH} px。`,
        [
          { label: '取消', value: 'cancel' },
          { label: '仅扩展不足边', value: 'expand', primary: true },
          { label: '调整为底图大小', value: 'image' }
        ]
      );
    }

    async function importBackgroundFile(file) {
      if (!file) return;
      try {
        const prepared = await prepareBackgroundImageFile(file);
        if (!prepared) return;
        const action = await chooseBackgroundCanvasAction(prepared.width, prepared.height);
        if (action === 'cancel') return;
        saveHistory(true);
        if (action === 'image') {
          state.pageW = prepared.width;
          state.pageH = prepared.height;
        } else if (action === 'expand') {
          state.pageW = Math.max(state.pageW, prepared.width);
          state.pageH = Math.max(state.pageH, prepared.height);
        }
        state.aspectRatio = state.pageW / Math.max(1, state.pageH);
        els.pagePreset.value = 'custom';
        els.pageWidth.value = state.pageW;
        els.pageHeight.value = state.pageH;
        updateAspectRatioFromPage();
        state.backgroundImage = {
          dataUrl: prepared.dataUrl,
          naturalWidth: prepared.width,
          naturalHeight: prepared.height,
          x: 0,
          y: 0,
          width: prepared.width,
          height: prepared.height,
          opacity: 1
        };
        backgroundImgElement = prepared.img;
        closeBackgroundPopover();
        resizeCanvas();
        draw();
      } catch (err) {
        alert('底图导入失败，请换一张图片再试');
      }
    }

    function closeBackgroundPopover() {
      const pop = document.getElementById('backgroundPopover');
      if (!pop) return;
      pop.classList.add('hidden');
      pop.setAttribute('aria-hidden', 'true');
    }

    function openBackgroundPopover(anchor) {
      const pop = document.getElementById('backgroundPopover');
      if (!pop) return;
      closeColorPopover();
      closeMorePopover();
      pop.innerHTML = '';
      const title = document.createElement('div');
      title.className = 'bg-popover-title';
      title.textContent = state.backgroundImage ? '底图设置' : '底图';
      pop.appendChild(title);
      const row = document.createElement('div');
      row.className = 'bg-popover-row';
      const replaceBtn = document.createElement('button');
      replaceBtn.type = 'button';
      replaceBtn.textContent = state.backgroundImage ? '替换底图' : '导入底图';
      replaceBtn.addEventListener('click', () => { closeBackgroundPopover(); els.backgroundImageInput.click(); });
      row.appendChild(replaceBtn);
      const clearBtn = document.createElement('button');
      clearBtn.type = 'button';
      clearBtn.textContent = '清除底图';
      clearBtn.disabled = !state.backgroundImage;
      clearBtn.addEventListener('click', async () => {
        if (!state.backgroundImage) return;
        const choice = await showChoiceDialog('清除底图', '确定清除当前底图？绘制对象不会被删除。', [
          { label: '取消', value: 'cancel' },
          { label: '清除底图', value: 'clear', primary: true }
        ]);
        if (choice !== 'clear') return;
        saveHistory(true);
        state.backgroundImage = null;
        backgroundImgElement = null;
        closeBackgroundPopover();
        draw();
      });
      row.appendChild(clearBtn);
      pop.appendChild(row);
      const label = document.createElement('div');
      label.className = 'bg-popover-title';
      label.textContent = '透明度（100%为完全显示）';
      pop.appendChild(label);
      const opacityRow = document.createElement('div');
      opacityRow.className = 'bg-opacity-row';
      [100, 75, 50, 25].forEach(v => {
        const b = document.createElement('button');
        b.type = 'button';
        b.textContent = v + '%';
        b.disabled = !state.backgroundImage;
        const current = Math.round(getBackgroundOpacity() * 100);
        b.classList.toggle('active', current === v);
        b.addEventListener('click', () => {
          if (!state.backgroundImage) return;
          saveHistory(true);
          state.backgroundImage.opacity = v / 100;
          openBackgroundPopover(anchor);
          draw();
        });
        opacityRow.appendChild(b);
      });
      pop.appendChild(opacityRow);
      const r = anchor.getBoundingClientRect();
      const left = Math.min(window.innerWidth - 252, Math.max(8, r.left));
      const top = Math.min(window.innerHeight - 180, r.bottom + 8);
      pop.style.left = left + 'px';
      pop.style.top = top + 'px';
      pop.classList.remove('hidden');
      pop.setAttribute('aria-hidden', 'false');
    }

    document.getElementById('saveJsonBtn').onclick=()=>{
      const blob=new Blob([JSON.stringify(buildProjectData(),null,2)],{type:'application/json'});
      const filename = currentProjectFileName || 'floor-plan-project.json';
      downloadBlob(blob, filename);
    };
    document.getElementById('openJsonBtn').onclick=()=>els.openJsonInput.click();
    els.openJsonInput.onchange=e=>{
      const file=e.target.files[0];
      if(!file)return;
      const reader=new FileReader();
      reader.onload=()=>{
        try{
          loadProjectData(JSON.parse(reader.result));
          currentProjectFileName = file.name || '';
          currentProjectDisplayName = getProjectDisplayName(currentProjectFileName);
          updateDocumentTitle();
        }
        catch(err){ alert('无法打开这个工程文件'); }
      };
      reader.readAsText(file);
      e.target.value='';
    };

    function cancelCurrentOperation() {
      let handled = false;
      if (state.resizingEndpoint || state.resizingBox || state.resizingAreaVertex) {
        restoreDragOriginals();
        state.resizingEndpoint = false;
        state.resizingBox = false;
        state.resizingAreaVertex = false;
        state.resizingObjectId = null;
        state.resizeEndpointIndex = null;
        state.resizeBoxHandle = null;
        state.resizeAreaVertexIndex = null;
        state.dragOriginals = null;
        state.resizeHistorySaved = false;
        handled = true;
      }
      if (state.dragging) {
        restoreDragOriginals();
        state.dragging = false;
        state.dragStartRaw = null;
        state.dragOriginals = null;
        state.dragHistorySaved = false;
        handled = true;
      }
      if (state.drawing) {
        state.drawing = false;
        state.start = null;
        state.current = null;
        handled = true;
      }
      if (state.areaDrawing) {
        cancelAreaDraft(false);
        handled = true;
      }
      if (state.erasing) {
        const last = state.objects[state.objects.length - 1];
        if (last && last.type === 'erase') state.objects.pop();
        state.erasing = false;
        state.current = null;
        handled = true;
      }
      if (state.boxSelecting) {
        state.boxSelecting = false;
        state.selectionBox = null;
        handled = true;
      }
      if (!handled && state.selectedIds.length) {
        state.selectedIds = [];
        handled = true;
      }
      if (!handled && state.tool !== 'select') {
        setTool('select');
        handled = true;
      }
      if (handled) { draw(); updateCursor(); }
      return handled;
    }

    function isTextEditingTarget(target) {
      if (!target) return false;
      const tag = String(target.tagName || '').toLowerCase();
      return target.isContentEditable || tag === 'input' || tag === 'textarea' || tag === 'select';
    }

    document.addEventListener('keydown', e=>{
      if((e.key === 'Enter' || e.key === 'Return') && state.tool === 'area' && state.areaDrawing && !isTextEditingTarget(e.target)){
        if(state.areaPoints.length >= 3 && completeAreaDraft()){ e.preventDefault(); updateCursor(); }
        return;
      }
      if(e.key === 'Escape'){ e.preventDefault(); cancelCurrentOperation(); return; }
      if((e.ctrlKey||e.metaKey)&&e.key.toLowerCase()==='z'){ e.preventDefault(); undo(); return; }
      if((e.ctrlKey||e.metaKey)&&e.key.toLowerCase()==='c'){ e.preventDefault(); copySelected(); return; }
      if((e.ctrlKey||e.metaKey)&&e.key.toLowerCase()==='v'){ e.preventDefault(); pasteClipboard(); return; }
      if((e.ctrlKey||e.metaKey)&&e.key.toLowerCase()==='g'&&!e.shiftKey){ e.preventDefault(); groupSelected(); return; }
      if((e.ctrlKey||e.metaKey)&&e.shiftKey&&e.key.toLowerCase()==='g'){ e.preventDefault(); ungroupSelected(); return; }
      if((e.key==='Delete'||e.key==='Backspace')&&state.selectedIds.length){ e.preventDefault(); deleteSelected(); return; }
      const keys=['ArrowUp','ArrowDown','ArrowLeft','ArrowRight'];
      if(keys.includes(e.key)&&state.selectedIds.length){ e.preventDefault(); const step=e.shiftKey?10:1; let dx=0,dy=0; if(e.key==='ArrowLeft')dx=-step; if(e.key==='ArrowRight')dx=step; if(e.key==='ArrowUp')dy=-step; if(e.key==='ArrowDown')dy=step; saveHistory(); state.objects.forEach(o=>{ if(state.selectedIds.includes(o.id))moveObject(o,dx,dy); }); draw(); }
    });

    [els.strokeColor,els.lineWidth,els.wallThickness,els.wallStyle,els.openingThicknessMode,els.areaOpacity,els.fontSize,els.arrowMode,els.arrowSize,els.dimensionLabelMode,els.eraserWidth,els.snapMode,els.gridSize,els.unitName,els.scaleFactor,els.layerSelect].forEach(el=>{ if(!el) return; el.addEventListener('input',draw); el.addEventListener('change',draw); });
    [els.exportFormat, els.exportScale, els.exportBackground].forEach(el=>{
      if(!el) return;
      el.addEventListener('change', () => { updateExportOptions(); syncSegmentedControls(el.id); });
    });


    els.propertyExpandBtn.addEventListener('click', () => {
      const expanded = els.objectMetrics.classList.toggle('expanded');
      document.querySelector('.app').classList.toggle('property-expanded', expanded);
      resizeCanvas();
    });

    updateAppVersionLabel();
    initSwatches();
    syncSegmentedControls();
    updateAspectRatioLockVisual();
    updateAspectRatioFromPage();
    resizeCanvas();
    updateCursor();
  </script>
</body>
</html>
