<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PY平面图工具</title>
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: Arial, "Microsoft YaHei", sans-serif;
      background: #e5e7eb;
      color: #111827;
      overflow: hidden;
    }
    .app {
      display: grid;
      grid-template-rows: var(--toolbar-height, 76px) 1fr;
      height: 100vh;
    }
    .top-toolbar {
      display: flex;
      align-items: stretch;
      gap: 22px;
      padding: 9px 16px;
      background: linear-gradient(#ffffff, #f8fafc);
      border-bottom: 1px solid #cbd5e1;
      box-shadow: 0 2px 12px rgba(15, 23, 42, 0.08);
      z-index: 5;
      overflow-x: auto;
      overflow-y: hidden;
      transition: padding .15s ease;
    }
    .app.property-expanded { --toolbar-height: 118px; }
    .brand-block {
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-self: stretch;
      min-width: 146px;
      padding-right: 18px;
      border-right: 1px solid #e2e8f0;
      flex: 0 0 auto;
    }
    .brand {
      font-weight: 900;
      font-size: 17px;
      letter-spacing: 1.2px;
      white-space: nowrap;
    }
    .brand-subtitle {
      margin-top: 2px;
      font-size: 11px;
      color: #64748b;
      white-space: nowrap;
    }
    .main {
      display: grid;
      grid-template-columns: 310px minmax(0, 1fr);
      min-height: 0;
      min-width: 0;
    }
    .sidebar {
      background: #ffffff;
      border-right: 1px solid #d1d5db;
      padding: 12px 14px;
      overflow-y: auto;
      font-size: 13px;
    }
    .sidebar button,
    .sidebar input,
    .sidebar select,
    .sidebar label {
      font-size: 13px;
    }
    .canvas-wrap {
      position: relative;
      overflow: auto;
      background: #eef2f7;
      min-width: 0;
      min-height: 0;
    }
    canvas {
      display: block;
      background: #eef2f7;
      cursor: default;
    }
    .canvas-wrap,
    #canvas {
      touch-action: none;
      overscroll-behavior: contain;
    }
    .group {
      border-top: 1px solid #e5e7eb;
      padding-top: 12px;
      margin-top: 12px;
    }
    .group:first-child { border-top: 0; margin-top: 0; padding-top: 0; }
    .group-title {
      font-size: 13px;
      font-weight: bold;
      color: #374151;
      margin-bottom: 8px;
    }
    button, input, select { font: inherit; }
    button {
      border: 1px solid #cbd5e1;
      background: #f8fafc;
      border-radius: 9px;
      padding: 8px 10px;
      cursor: pointer;
      transition: background .15s ease, border-color .15s ease, box-shadow .15s ease, transform .08s ease;
      white-space: nowrap;
    }
    button:hover { background: #eef2ff; border-color: #93c5fd; }
    button:active { transform: translateY(1px); }
    button.active {
      background: #1d4ed8;
      border-color: #1d4ed8;
      color: white;
      box-shadow: 0 2px 8px rgba(37, 99, 235, .25);
    }
    button.danger:hover { background: #fee2e2; border-color: #fca5a5; }
    #applyStyleBtn { font-weight: 800; background: #eff6ff; border-color: #93c5fd; color: #1d4ed8; }
    #applyStyleBtn:hover { background: #dbeafe; border-color: #60a5fa; }
    .tool-strip {
      display: flex;
      gap: 6px;
      flex-wrap: nowrap;
      align-items: center;
      flex: 0 0 auto;
    }
    .toolbar-section {
      display: flex;
      flex-direction: column;
      justify-content: flex-start;
      gap: 6px;
      padding-right: 18px;
      border-right: 1px solid #e2e8f0;
      flex: 0 0 auto;
    }
    .toolbar-section:last-child { border-right: 0; padding-right: 0; }
    .section-label {
      font-size: 11px;
      font-weight: 800;
      letter-spacing: .08em;
      color: #64748b;
      line-height: 1;
      text-transform: uppercase;
    }
    .tool-btn, .toolbar-btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      height: 34px;
      min-height: 34px;
      padding: 0 10px;
      font-size: 13px;
      color: #0f172a;
      background: #ffffff;
      border-color: #d6dee9;
      border-radius: 8px;
    }
    .tool-btn svg, .toolbar-btn svg { width: 17px; height: 17px; display: block; flex: 0 0 auto; }
    .toolbar-btn svg { stroke-width: 1.8; }
    .tool-btn.active, .tool-btn.active .mini-icon { color: #ffffff; border-color: rgba(255,255,255,.75); }
    .small-btn { min-width: 34px; padding-left: 8px; padding-right: 8px; }
    .primary-command { background: #eff6ff; border-color: #93c5fd; color: #1d4ed8; font-weight: 700; }
    .zoom-pill, .zoom-input {
      min-width: 52px;
      height: 34px;
      min-height: 34px;
      line-height: 20px;
      box-sizing: border-box;
      text-align: center;
      font-size: 13px;
      font-weight: 400;
      color: #0f172a;
      border: 1px solid #d6dee9;
      background: #ffffff;
      border-radius: 999px;
      padding: 5px 9px;
    }
    .zoom-input {
      width: 92px;
      min-width: 92px;
      max-width: 92px;
      flex: 0 0 92px;
      padding-left: 6px;
      padding-right: 6px;
      outline: none;
    }
    .top-toolbar input.zoom-input {
      width: 92px !important;
      min-width: 92px !important;
      max-width: 92px !important;
      flex: 0 0 92px;
    }
    .zoom-input:focus {
      border-color: #2563eb;
      box-shadow: 0 0 0 3px rgba(37, 99, 235, .14);
    }

    .property-section {
      width: 536px;
      min-width: 536px;
      max-width: 536px;
      gap: 6px;
    }
    .property-title-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
      height: 11px;
      line-height: 1;
    }
    .property-expand-btn {
      width: 24px;
      height: 16px;
      min-height: 16px;
      padding: 0;
      border: 0;
      border-radius: 0;
      font-size: 18px;
      font-weight: 900;
      line-height: 14px;
      color: #334155;
      background: transparent;
      box-shadow: none;
    }
    .property-expand-btn:hover { background: transparent; color: #1d4ed8; }
    .property-section.expanded .property-expand-btn { transform: rotate(180deg); }
    .property-strip {
      --prop-control-height: 34px;
      width: 100%;
      min-width: 0;
      height: 34px;
      min-height: 34px;
      max-height: 34px;
      display: grid !important;
      grid-template-columns: repeat(4, 122px);
      grid-auto-rows: var(--prop-control-height);
      column-gap: 8px;
      row-gap: 6px;
      overflow: hidden;
      padding-bottom: 0;
      align-content: start;
      align-items: start;
    }
    .property-section.expanded .property-strip {
      height: 74px;
      min-height: 74px;
      max-height: 74px;
      overflow: hidden;
      padding-bottom: 0;
    }
    .property-strip .metric-group,
    .property-strip .metric-input,
    .property-strip .prop-color-current {
      height: var(--prop-control-height) !important;
      min-height: var(--prop-control-height) !important;
      max-height: var(--prop-control-height) !important;
    }
    .property-section.property-empty .property-strip {
      visibility: hidden;
    }
    .property-strip::-webkit-scrollbar { display: none; }
    .metric-group {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      width: 122px;
      min-width: 122px;
      max-width: 122px;
      flex: 0 0 auto;
    }
    .metric-group.compact { min-width: auto; }
    .metric-label {
      width: 34px;
      min-width: 34px;
      text-align: left;
      font-size: 12px;
      font-weight: 700;
      color: #475569;
      white-space: nowrap;
    }
    .metric-group.wide-label .metric-label { width: 34px; min-width: 34px; }
    .metric-input {
      width: 60px !important;
      min-width: 60px !important;
      max-width: 60px !important;
      height: 34px !important;
      min-height: 34px !important;
      max-height: 34px !important;
      line-height: 20px;
      box-sizing: border-box;
      text-align: center;
      font-size: 12px;
      font-weight: 400;
      border: 1px solid #d6dee9;
      border-radius: 999px;
      padding: 5px 6px;
      outline: none;
      background: #ffffff;
    }
    .metric-input.angle-input {
      width: 60px !important;
      min-width: 60px !important;
      max-width: 60px !important;
    }

    .top-toolbar input,
    .top-toolbar select,
    .top-toolbar option {
      font-weight: 400;
    }
    .property-strip select.metric-input {
      appearance: none;
      -webkit-appearance: none;
      background-image: none;
      padding-left: 8px;
      padding-right: 8px;
    }


    .metric-input:focus {
      border-color: #2563eb;
      box-shadow: 0 0 0 3px rgba(37, 99, 235, .14);
    }
    .metric-input.prop-text {
      width: 80px !important;
      min-width: 80px !important;
      max-width: 80px !important;
      text-align: left;
      border-radius: 10px;
      font-weight: 400;
    }
    .metric-input.prop-select {
      width: 60px !important;
      min-width: 60px !important;
      max-width: 60px !important;
      border-radius: 10px;
      padding: 5px 6px;
      font-weight: 400;
    }
    .prop-color-picker {
      position: relative;
      display: inline-flex;
      align-items: center;
      flex: 0 0 auto;
    }
    .prop-color-current {
      width: 60px;
      min-width: 60px;
      max-width: 60px;
      height: var(--prop-control-height) !important;
      min-height: var(--prop-control-height) !important;
      max-height: var(--prop-control-height) !important;
      padding: 0 !important;
      border-radius: 999px;
      border: 1px solid #cbd5e1;
      background: #111827;
      box-shadow: inset 0 0 0 2px rgba(255,255,255,.75), 0 1px 3px rgba(15, 23, 42, .10);
      appearance: none;
    }
    .color-popover {
      position: fixed;
      z-index: 9999;
      display: grid;
      grid-template-columns: repeat(8, 24px);
      gap: 7px;
      padding: 10px;
      background: #ffffff;
      border: 1px solid #cbd5e1;
      border-radius: 12px;
      box-shadow: 0 12px 30px rgba(15, 23, 42, .18);
    }
    .color-popover.hidden { display: none; }
    .color-popover button {
      width: 24px;
      height: 24px;
      min-height: 24px;
      padding: 0;
      border-radius: 999px;
      border: 1px solid #cbd5e1;
      box-shadow: inset 0 0 0 1px rgba(255,255,255,.65);
    }
    .color-popover button.active {
      border-color: #1d4ed8;
      box-shadow: 0 0 0 2px rgba(37,99,235,.24), inset 0 0 0 1px rgba(255,255,255,.85);
    }
    .prop-more-btn {
      height: var(--prop-control-height) !important;
      min-height: var(--prop-control-height) !important;
      max-height: var(--prop-control-height) !important;
      padding: 0 10px !important;
      border-radius: 999px;
      font-size: 12px;
      font-weight: 700;
      color: #334155;
      background: #ffffff;
      border: 1px solid #d6dee9;
    }
    .prop-more-popover {
      position: fixed;
      z-index: 9998;
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      gap: 8px;
      width: 360px;
      max-width: calc(100vw - 24px);
      padding: 12px;
      background: #ffffff;
      border: 1px solid #cbd5e1;
      border-radius: 14px;
      box-shadow: 0 14px 34px rgba(15, 23, 42, .18);
    }
    .prop-more-popover.hidden { display: none; }
    .bg-popover {
      position: fixed;
      z-index: 9998;
      display: flex;
      flex-direction: column;
      gap: 9px;
      width: 240px;
      max-width: calc(100vw - 24px);
      padding: 12px;
      background: #ffffff;
      border: 1px solid #cbd5e1;
      border-radius: 14px;
      box-shadow: 0 14px 34px rgba(15, 23, 42, .18);
    }
    .bg-popover.hidden { display: none; }
    .bg-popover-title {
      font-size: 12px;
      font-weight: 800;
      color: #475569;
      letter-spacing: .04em;
    }
    .bg-popover-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
    }
    .bg-popover button {
      min-height: 32px;
      padding: 6px 8px;
      font-size: 12px;
    }
    .bg-opacity-row {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 6px;
    }
    .bg-opacity-row button.active {
      background: #1d4ed8;
      color: #ffffff;
      border-color: #1d4ed8;
    }
    .color-popover button[title="#ffffff"] { border-color: #94a3b8; }
    .metric-unit {
      font-size: 12px;
      color: #64748b;
      min-width: 16px;
    }
    .mini-icon {
      position: relative;
      display: inline-block;
      width: 16px;
      height: 16px;
      color: #334155;
      flex: 0 0 auto;
    }
    .line-icon::before, .wall-icon::before, .arrow-icon::before, .dimension-icon::before, .window-icon::before {
      content: ""; position: absolute; left: 1px; right: 1px; top: 7px; border-top: 2px solid currentColor; transform: rotate(-28deg);
    }
    .wall-icon::before { border-top-width: 5px; top: 6px; opacity: .9; }
    .arrow-icon::after { content: ""; position: absolute; right: 0px; top: 3px; width: 7px; height: 7px; border-right: 2px solid currentColor; border-top: 2px solid currentColor; transform: rotate(18deg); }
    .rect-icon { border: 2px solid currentColor; border-radius: 2px; }
    .ellipse-icon { border: 2px solid currentColor; border-radius: 50%; }
    .area-icon svg { width: 17px; height: 17px; display: block; }
    .door-icon::before { content: ""; position:absolute; left:2px; bottom:2px; width:10px; height:10px; border-left:2px solid currentColor; border-bottom:2px solid currentColor; border-radius:0 0 10px 0; }
    .window-icon::before { transform: none; top: 5px; box-shadow: 0 5px 0 currentColor; border-top-width: 2px; }
    .dimension-icon::after { content: ""; position:absolute; left:1px; right:1px; top:4px; bottom:4px; border-left:2px solid currentColor; border-right:2px solid currentColor; }
    .text-icon { font-weight: 800; font-size: 14px; line-height: 16px; text-align:center; }
    .eraser-icon { transform: rotate(-25deg); border: 2px solid currentColor; border-radius: 3px; width: 15px; height: 10px; margin-top: 3px; }
    .save-icon { border: 2px solid currentColor; border-radius: 3px; }
    .save-icon::before { content:""; position:absolute; left:3px; right:3px; bottom:2px; height:4px; border:1.5px solid currentColor; border-radius:1px; }
    .open-icon::before { content:""; position:absolute; left:1px; top:5px; width:14px; height:8px; border:2px solid currentColor; border-radius:2px; transform:skewX(-10deg); }
    .open-icon::after { content:""; position:absolute; left:2px; top:2px; width:8px; height:5px; border:2px solid currentColor; border-bottom:0; border-radius:2px 2px 0 0; }
    .export-icon::before { content:""; position:absolute; left:7px; top:1px; height:9px; border-left:2px solid currentColor; }
    .export-icon::after { content:""; position:absolute; left:4px; top:6px; width:7px; height:7px; border-right:2px solid currentColor; border-bottom:2px solid currentColor; transform:rotate(45deg); }
    .undo-icon::before { content:""; position:absolute; left:2px; top:4px; width:11px; height:8px; border:2px solid currentColor; border-right-color:transparent; border-radius:10px 0 0 10px; }
    .undo-icon::after { content:""; position:absolute; left:1px; top:3px; width:6px; height:6px; border-left:2px solid currentColor; border-top:2px solid currentColor; transform:rotate(-45deg); }
    .copy-icon::before, .copy-icon::after { content:""; position:absolute; width:9px; height:11px; border:2px solid currentColor; border-radius:2px; background:transparent; }
    .copy-icon::before { left:2px; top:3px; opacity:.65; }
    .copy-icon::after { left:5px; top:1px; }
    .paste-icon::before { content:""; position:absolute; left:3px; top:4px; width:10px; height:10px; border:2px solid currentColor; border-radius:2px; }
    .paste-icon::after { content:""; position:absolute; left:5px; top:1px; width:6px; height:4px; border:2px solid currentColor; border-radius:2px; background:#fff; }
    .delete-icon::before { content:""; position:absolute; left:4px; top:5px; width:8px; height:10px; border:2px solid currentColor; border-top:0; border-radius:0 0 2px 2px; }
    .delete-icon::after { content:""; position:absolute; left:3px; top:2px; width:10px; border-top:2px solid currentColor; box-shadow:3px -2px 0 -1px currentColor; }
    .tool-strip button { padding: 6px 9px; }
    .toolbar-spacer { flex: 1; }
    .row {
      display: flex;
      gap: 8px;
      align-items: center;
      margin: 8px 0;
    }
    .checkbox-row {
      justify-content: center;
      gap: 10px;
    }
    .checkbox-row .checkbox-label {
      min-width: 0;
      font-weight: 600;
      color: #374151;
    }
    .checkbox-row input[type="checkbox"] {
      width: 18px;
      height: 18px;
      accent-color: #2563eb;
      cursor: pointer;
      flex: 0 0 auto;
    }
    label {
      font-size: 13px;
      color: #374151;
      min-width: 86px;
    }
    input[type="number"], input[type="text"], input[type="color"], select {
      width: 100%;
      border: 1px solid #cbd5e1;
      border-radius: 8px;
      padding: 7px;
      background: white;
    }
    input[type="color"] { padding: 2px; height: 34px; }
    .grid-2 {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
    }
    .grid-3 {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      gap: 8px;
    }

    .segmented {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      width: 100%;
      border: 1px solid #cbd5e1;
      border-radius: 9px;
      overflow: hidden;
      background: #f8fafc;
    }
    .segmented button {
      border: 0;
      border-radius: 0;
      min-width: 0;
      min-height: 34px;
      padding: 6px 8px;
      background: #ffffff;
      color: #334155;
      font-weight: 400;
      box-shadow: none;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    .segmented button + button { border-left: 1px solid #cbd5e1; }
    .segmented button.active {
      background: #1d4ed8;
      color: #ffffff;
      font-weight: 700;
      box-shadow: inset 0 0 0 1px rgba(255,255,255,.18);
    }
    .segmented button:hover { background: #eef2ff; }
    .segmented button.active:hover { background: #1d4ed8; }
    .segmented button:disabled {
      color: #94a3b8;
      background: #f1f5f9;
      cursor: not-allowed;
    }
    .segmented button:disabled:hover { background: #f1f5f9; }
    .segmented-3 { grid-template-columns: repeat(3, minmax(0, 1fr)); }
    .export-group .segmented { width: 100%; }
    .export-group .segmented button { padding-left: 4px; padding-right: 4px; }
    .aspect-lock-row .checkbox-label {
      min-width: 0;
      font-weight: 600;
    }
    .page-size-block {
      position: relative;
    }
    .page-size-block .row {
      position: relative;
      z-index: 1;
    }
    .aspect-link {
      display: flex;
      justify-content: flex-start;
      align-items: center;
      height: 12px;
      margin: -2px 0 -2px calc(86px + 8px);
      color: #1d4ed8;
      font-size: 15px;
      line-height: 1;
      user-select: none;
    }
    .aspect-link.unlocked {
      color: #94a3b8;
      opacity: .25;
    }
    .full { width: 100%; }
    .swatches {
      display: grid;
      grid-template-columns: repeat(8, 1fr);
      gap: 6px;
      margin-top: 8px;
    }
    .swatch {
      height: 24px;
      border-radius: 7px;
      border: 1px solid #cbd5e1;
      cursor: pointer;
      padding: 0;
    }
    .swatch[title="#ffffff"] { border-color: #94a3b8; }
    .hint {
      font-size: 12px;
      line-height: 1.5;
      color: #6b7280;
      background: #f9fafb;
      border: 1px solid #e5e7eb;
      border-radius: 8px;
      padding: 8px;
    }
    .status {
      position: absolute;
      left: 14px;
      top: 14px;
      background: rgba(255,255,255,0.95);
      border: 1px solid #d1d5db;
      border-radius: 10px;
      padding: 8px 10px;
      box-shadow: 0 4px 14px rgba(0,0,0,0.08);
      font-size: 13px;
      z-index: 2;
      pointer-events: none;
    }
    .pill {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      border: 1px solid #e5e7eb;
      border-radius: 999px;
      padding: 4px 8px;
      font-size: 12px;
      background: #f9fafb;
    }
    .hidden-input { display: none; }

    .export-actions {
      display: grid;
      grid-template-columns: 1fr;
      gap: 8px;
    }
    .export-actions button {
      width: 100%;
      min-height: 38px;
      padding-left: 8px;
      padding-right: 8px;
    }
    .export-group {
      background: #f8fafc;
      border: 1px solid #e2e8f0;
      border-radius: 12px;
      padding: 12px;
    }
    .export-group .group-title {
      color: #0f172a;
    }
    .export-actions button:first-child {
      background: #eff6ff;
      border-color: #93c5fd;
      color: #1d4ed8;
      font-weight: 700;
    }
  </style>
</head>
<body>
  <div class="app">
    <header class="top-toolbar">
      <div class="brand-block">
        <div class="brand">PY平面图工具</div>
        <div class="brand-subtitle" id="appVersionLabel"></div>
      </div>

    function uid() { return crypto.randomUUID ? crypto.randomUUID() : String(Date.now() + Math.random()); }

    function initSwatches() {
      const box = document.getElementById('swatches');
      colors.forEach(c => {
        const b = document.createElement('button');
        b.className = 'swatch';
        b.style.background = c;
        b.title = c;
        b.addEventListener('click', () => { els.strokeColor.value = c; draw(); });
        box.appendChild(b);
      });
    }

    function resizeCanvas() {
      const wrap = document.querySelector('.canvas-wrap');
      const margin = 40;
      const displayW = Math.max(wrap.clientWidth, state.panX + state.pageW * state.zoom + margin);
      const displayH = Math.max(wrap.clientHeight, state.panY + state.pageH * state.zoom + margin);

      canvas.width = Math.ceil(displayW * devicePixelRatio);
      canvas.height = Math.ceil(displayH * devicePixelRatio);
      canvas.style.width = displayW + 'px';
      canvas.style.height = displayH + 'px';
      draw();
    }

    function setZoom(z, centerClientX, centerClientY) {
      const wrap = document.querySelector('.canvas-wrap');
      const oldZoom = state.zoom;
      const newZoom = Math.max(.25, Math.min(3, z));
      if (Math.abs(newZoom - oldZoom) < 0.0001) return;

      const wrapRect = wrap.getBoundingClientRect();
      const canvasRect = canvas.getBoundingClientRect();
      const centerX = centerClientX ?? (wrapRect.left + wrap.clientWidth / 2);
      const centerY = centerClientY ?? (wrapRect.top + wrap.clientHeight / 2);
      const worldX = (centerX - canvasRect.left - state.panX) / oldZoom;
      const worldY = (centerY - canvasRect.top - state.panY) / oldZoom;

      state.zoom = newZoom;
      resizeCanvas();

      const targetCanvasX = state.panX + worldX * newZoom;
      const targetCanvasY = state.panY + worldY * newZoom;
      wrap.scrollLeft = targetCanvasX - (centerX - wrapRect.left);
      wrap.scrollTop = targetCanvasY - (centerY - wrapRect.top);
      draw();
    }

    window.addEventListener('resize', resizeCanvas);

    function screenToWorld(e, useSnap = true) {
      const rect = canvas.getBoundingClientRect();
      let x = (e.clientX - rect.left - state.panX) / state.zoom;
      let y = (e.clientY - rect.top - state.panY) / state.zoom;
      if (useSnap && els.snapMode.value === 'on') {
        const g = Number(els.gridSize.value) || 20;
        x = Math.round(x / g) * g;
        y = Math.round(y / g) * g;
      }
      return { x, y };
    }
    function rawScreenToWorld(e) { return screenToWorld(e, false); }

    function saveHistory(includeBackground = false) {
      const snapshot = { objects: state.objects, groups: state.groups, pageW: state.pageW, pageH: state.pageH, aspectRatio: state.aspectRatio };
      if (includeBackground) snapshot.backgroundImage = state.backgroundImage;
      state.history.push(JSON.stringify(snapshot));
      if (state.history.length > 100) state.history.shift();
    }
    function undo() {
      if (!state.history.length) return;
      const old = JSON.parse(state.history.pop());
      state.objects = old.objects || [];
      state.groups = old.groups || {};
      state.pageW = old.pageW || state.pageW;
      state.pageH = old.pageH || state.pageH;
      state.aspectRatio = old.aspectRatio || (state.pageW / Math.max(1, state.pageH));
      if (Object.prototype.hasOwnProperty.call(old, 'backgroundImage')) {
        state.backgroundImage = normalizeBackgroundImage(old.backgroundImage || null);
        ensureBackgroundImageLoaded().catch(() => { state.backgroundImage = null; backgroundImgElement = null; draw(); });
      }
      els.pageWidth.value = state.pageW;
      els.pageHeight.value = state.pageH;
      state.selectedIds = [];
      resizeCanvas();
      draw();
    }

    function getDefaultAreaFillOpacity() {
      const raw = Number(els.areaOpacity && els.areaOpacity.value);
      if (!Number.isFinite(raw)) return 1;
      return Math.max(0, Math.min(100, raw)) / 100;
    }

    function currentStyle() {
      return {
        color: els.strokeColor.value,
        lineWidth: Number(els.lineWidth.value) || 2,
        areaOpacity: getDefaultAreaFillOpacity(),
        fontSize: Number(els.fontSize.value) || 20,
        arrowMode: els.arrowMode.value || 'end',
        arrowSize: Number(els.arrowSize.value) || 14,
        dimensionLabelMode: els.dimensionLabelMode.value || 'inline',
        wallThickness: Number(els.wallThickness.value) || 10,
        wallStyle: els.wallStyle.value || 'hollow',
        openingThicknessMode: els.openingThicknessMode.value || 'linear',
        openingUseWallThickness: els.openingThicknessMode.value === 'wall',
        layer: els.layerSelect.value
      };
    }

    function addObject(obj) {
      saveHistory();
      const s = currentStyle();
      const layer = obj.layer || s.layer || toolLayer[obj.type] || 'walls';
      const newObj = { id: uid(), ...s, layer, ...obj };
      state.objects.push(newObj);
      state.selectedIds = [newObj.id];
      draw();
    }

    function draw() {
      const w = canvas.clientWidth, h = canvas.clientHeight;
      ctx.save();
      ctx.setTransform(devicePixelRatio, 0, 0, devicePixelRatio, 0, 0);
      ctx.clearRect(0, 0, w, h);
      ctx.fillStyle = '#eef2f7';
      ctx.fillRect(0, 0, w, h);
      ctx.translate(state.panX, state.panY);
      ctx.scale(state.zoom, state.zoom);
      drawPageBackground(ctx);
      drawGrid(ctx);
      drawBackgroundImage(ctx);
      // 固定显示顺序由 buildRenderItems() 统一生成，屏幕、图片导出、PDF 导出共用同一套基础绘图元素。
      drawCanvasRenderItems(ctx, buildRenderItems(state.objects));
      if (state.drawing && state.start && state.current && !['select','text','eraser','area'].includes(state.tool)) {
        drawCanvasRenderItems(ctx, buildObjectRenderItems(buildShapeFromPoints(state.tool, state.start, state.current, true)));
      }
      if (state.areaDrawing) drawAreaDraft(ctx);
      state.objects.forEach(obj => {
        if (obj.id && state.selectedIds.includes(obj.id) && obj.type !== 'erase') drawSelection(ctx, obj);
      });
      if (state.boxSelecting && state.selectionBox) drawSelectionBox(ctx);
      if (state.erasing && state.current) drawEraserCursor(ctx);
      ctx.restore();
      updateStatus();
    }

    function updateStatus() {
      els.status.textContent = `当前工具：${toolNames[state.tool]} | 已选 ${state.selectedIds.length} 个对象`;
      if (document.activeElement !== els.zoomInput) els.zoomInput.value = `${Math.round(state.zoom * 100)}%`;
      updateObjectMetrics();
    }

    function isEditableLineObject(o) {
      return o && ['line','arrow','wall','dimension','door','window'].includes(o.type);
    }

    function getSingleEditableLineObject() {
      if (state.selectedIds.length !== 1) return null;
      const o = state.objects.find(x => x.id === state.selectedIds[0]);
      return isEditableLineObject(o) ? o : null;
    }

    function getObjectPixelLength(o) {
      if (!isEditableLineObject(o)) return 0;
      return Math.hypot(o.x2 - o.x1, o.y2 - o.y1);
    }

    function getScaleFactorValue() {
      return Math.max(0.0001, Number(els.scaleFactor.value) || 1);
    }

    function getObjectAngleDegrees(o) {
      if (!isEditableLineObject(o)) return 0;
      // 用户界面采用行业常见规则：正角度为逆时针。
      // Canvas 屏幕坐标的 y 轴向下，atan2 得到的是视觉顺时针角度，所以显示时需要反转。
      const internalDeg = Math.atan2(o.y2 - o.y1, o.x2 - o.x1) * 180 / Math.PI;
      return (360 - ((internalDeg + 360) % 360)) % 360;
    }

    function getSingleSelectedObject() {
      if (state.selectedIds.length !== 1) return null;
      return state.objects.find(x => x.id === state.selectedIds[0]) || null;
    }

    function getPropertyDefs(o) {
      if (!o || o.type === 'erase') return [];
      const defs = [];
      if (isEditableLineObject(o)) {
        defs.push({ key:'length', label:'长度', type:'number', unit: els.unitName.value.trim() || 'unit' });
        defs.push({ key:'angle', label:'角度', type:'number', unit:'°', cls:'angle-input' });
      }
      if (['rect','ellipse'].includes(o.type)) {
        defs.push({ key:'width', label:'宽', type:'number', unit:'px' });
        defs.push({ key:'height', label:'高', type:'number', unit:'px' });
      }
      if (o.type === 'text') defs.push({ key:'text', label:'文字', type:'text' });
      defs.push({ key:'color', label:'颜色', type:'swatches' });
      if (['wall','line','arrow','rect','ellipse','dimension','door','window','area'].includes(o.type)) defs.push({ key:'lineWidth', label:'线宽', type:'number', unit:'px' });
      if (o.type === 'area') defs.push({ key:'fillOpacity', label:'透明度', type:'number', unit:'%' });
      if (o.type === 'wall') {
        defs.push({ key:'wallThickness', label:'墙厚', type:'number', unit:'px' });
        defs.push({ key:'wallStyle', label:'墙体', type:'select', options:[['hollow','空心'],['solid','实心']] });
      }
      if (['door','window'].includes(o.type)) defs.push({ key:'openingThicknessMode', label:'厚度', type:'select', options:[['linear','线性'],['wall','墙体']] });
      if (o.type === 'door') defs.push({ key:'doorSwing', label:'开向', type:'select', options:[['right','右开'],['left','左开']] });
      if (['text','dimension'].includes(o.type)) defs.push({ key:'fontSize', label:'字号', type:'number', unit:'px' });
      if (o.type === 'arrow') {
        defs.push({ key:'arrowMode', label:'箭头', type:'select', options:[['end','单箭头'],['both','双箭头']] });
        defs.push({ key:'arrowSize', label:'大小', type:'number', unit:'px' });
      }
      if (o.type === 'dimension') {
        defs.push({ key:'arrowSize', label:'大小', type:'number', unit:'px' });
        defs.push({ key:'dimensionLabelMode', label:'文字', type:'select', options:[['inline','压线'],['above','上方'],['below','下方']] });
      }
      defs.push({ key:'layer', label:'图层', type:'select', options:[['areas','区域'],['walls','墙体'],['symbols','门窗'],['shapes','图形'],['annotations','标注'],['text','文字']] });
      return defs;
    }

    function getPropertyValue(o, key) {
      if (key === 'length') return formatNumber(getObjectPixelLength(o) * getScaleFactorValue());
      if (key === 'angle') return formatNumber(getObjectAngleDegrees(o));
      if (key === 'width' || key === 'height') {
        const b = getObjectBox(o);
        return formatNumber(key === 'width' ? Math.abs(b.w) : Math.abs(b.h));
      }
      if (key === 'text') return o.text || '文字';
      if (key === 'color') return o.color || '#111827';
      if (key === 'lineWidth') return o.lineWidth || 2;
      if (key === 'fillOpacity') return Math.round(getAreaFillOpacity(o) * 100);
      if (key === 'wallThickness') return o.wallThickness || 10;
      if (key === 'wallStyle') return o.wallStyle || 'hollow';
      if (key === 'openingThicknessMode') return o.openingThicknessMode || (o.openingUseWallThickness ? 'wall' : 'linear');
      if (key === 'doorSwing') return o.doorSwing || o.swing || 'right';
      if (key === 'fontSize') return o.fontSize || 20;
      if (key === 'arrowMode') return o.arrowMode || 'end';
      if (key === 'arrowSize') return o.arrowSize || 14;
      if (key === 'dimensionLabelMode') return o.dimensionLabelMode || 'inline';
      if (key === 'layer') return o.layer || toolLayer[o.type] || 'walls';
      return o[key] ?? '';
    }

    function buildPropertyField(def, value) {
      const group = document.createElement('span');
      group.className = 'metric-group' + (String(def.label || '').length > 2 ? ' wide-label' : '');
      const label = document.createElement('span');
      label.className = 'metric-label';
      label.textContent = def.label;
      group.appendChild(label);
      let input;
      if (def.type === 'swatches') {
        const picker = document.createElement('span');
        picker.className = 'prop-color-picker';
        const b = document.createElement('button');
        b.type = 'button';
        b.className = 'prop-color-current';
        b.style.background = value || '#111827';
        b.title = `当前颜色：${value || '#111827'}`;
        b.dataset.prop = def.key;
        b.dataset.value = value || '#111827';
        b.addEventListener('click', e => {
          e.stopPropagation();
          openColorPopover(b, def.key, b.dataset.value);
        });
        picker.appendChild(b);
        group.appendChild(picker);
        return group;
      }
      if (def.type === 'select') {
        input = document.createElement('select');
        input.className = 'metric-input prop-select';
        def.options.forEach(([v, text]) => {
          const opt = document.createElement('option');
          opt.value = v; opt.textContent = text;
          input.appendChild(opt);
        });
      } else {
        input = document.createElement('input');
        input.type = 'text';
        input.inputMode = def.type === 'number' ? 'decimal' : 'text';
        input.className = 'metric-input' + (def.cls ? ' ' + def.cls : '') + (def.type === 'text' ? ' prop-text' : '');
      }
      input.dataset.prop = def.key;
      input.value = value;
      input.addEventListener('change', () => applyPropertyInput(input));
      input.addEventListener('keydown', e => {
        if (e.key === 'Enter') { e.preventDefault(); e.stopPropagation(); input.blur(); }
        if (e.key === 'Escape') { e.preventDefault(); e.stopPropagation(); updateObjectMetrics(true); input.blur(); }
      });
      group.appendChild(input);
      if (def.unit) {
        const unit = document.createElement('span');
        unit.className = 'metric-unit';
        unit.textContent = def.unit;
        group.appendChild(unit);
      }
      return group;
    }

    let activeColorAnchor = null;
    let activeColorProp = null;

    function closeColorPopover() {
      const pop = document.getElementById('colorPopover');
      if (!pop) return;
      pop.classList.add('hidden');
      pop.setAttribute('aria-hidden', 'true');
      activeColorAnchor = null;
      activeColorProp = null;
    }

    function openColorPopover(anchor, propKey, currentValue) {
      const pop = document.getElementById('colorPopover');
      if (!pop) return;
      activeColorAnchor = anchor;
      activeColorProp = propKey;
      pop.innerHTML = '';
      colors.forEach(c => {
        const b = document.createElement('button');
        b.type = 'button';
        b.style.background = c;
        b.title = c;
        b.className = String(currentValue).toLowerCase() === c.toLowerCase() ? 'active' : '';
        b.addEventListener('click', e => {
          e.stopPropagation();
          const fakeInput = { dataset: { prop: activeColorProp, value: c }, value: c };
          applyPropertyInput(fakeInput);
          closeColorPopover();
        });
        pop.appendChild(b);
      });
      const r = anchor.getBoundingClientRect();
      const left = Math.min(window.innerWidth - 230, Math.max(8, r.left));
      const top = Math.min(window.innerHeight - 80, r.bottom + 8);
      pop.style.left = left + 'px';
      pop.style.top = top + 'px';
      pop.classList.remove('hidden');
      pop.setAttribute('aria-hidden', 'false');
    }

    document.addEventListener('click', e => {
      const pop = document.getElementById('colorPopover');
      if (pop && !pop.classList.contains('hidden')) {
        if (!(pop.contains(e.target) || (activeColorAnchor && activeColorAnchor.contains(e.target)))) closeColorPopover();
      }
      const morePop = document.getElementById('propMorePopover');
      if (morePop && !morePop.classList.contains('hidden')) {
        if (!morePop.contains(e.target) && !e.target.closest('.prop-more-btn')) closeMorePopover();
      }
      const bgPop = document.getElementById('backgroundPopover');
      if (bgPop && !bgPop.classList.contains('hidden')) {
        if (!bgPop.contains(e.target) && !e.target.closest('#backgroundBtn')) closeBackgroundPopover();
      }
    });

    function splitPropertyDefs(defs, expanded) {
      // 固定槽位：折叠状态永远显示第一行 4 个核心属性；展开状态显示两行，
      // 如仍有低频属性，则把“更多”固定放在第二行最后一个槽位，避免控件上下跳动。
      const maxDirect = expanded ? 7 : 4;
      const direct = defs.slice(0, maxDirect);
      const more = defs.slice(maxDirect);
      return { direct, more };
    }

    function closeMorePopover() {
      const pop = document.getElementById('propMorePopover');
      if (!pop) return;
      pop.classList.add('hidden');
      pop.setAttribute('aria-hidden', 'true');
    }

    function openMorePopover(anchor, defs, obj) {
      const pop = document.getElementById('propMorePopover');
      if (!pop) return;
      closeColorPopover();
      pop.innerHTML = '';
      defs.forEach(def => pop.appendChild(buildPropertyField(def, getPropertyValue(obj, def.key))));
      const r = anchor.getBoundingClientRect();
      const left = Math.min(window.innerWidth - 372, Math.max(8, r.left - 220));
      const top = Math.min(window.innerHeight - 140, r.bottom + 8);
      pop.style.left = left + 'px';
      pop.style.top = top + 'px';
      pop.classList.remove('hidden');
      pop.setAttribute('aria-hidden', 'false');
    }

    function buildMoreButton(moreDefs, obj) {
      const btn = document.createElement('button');
      btn.type = 'button';
      btn.className = 'prop-more-btn';
      btn.textContent = '更多 ▾';
      btn.title = '显示更多属性';
      btn.addEventListener('click', e => {
        e.stopPropagation();
        const pop = document.getElementById('propMorePopover');
        if (pop && !pop.classList.contains('hidden')) closeMorePopover();
        else openMorePopover(btn, moreDefs, obj);
      });
      return btn;
    }

    function updateObjectMetrics(forceRebuild = false) {
      const o = getSingleSelectedObject();
      const fields = document.getElementById('propertyFields');
      if (!o || state.selectedIds.length !== 1) {
        closeColorPopover();
        closeMorePopover();
        els.objectMetrics.classList.add('property-empty');
        fields.innerHTML = '';
        fields.dataset.signature = '';
        return;
      }
      const defs = getPropertyDefs(o);
      const expanded = els.objectMetrics.classList.contains('expanded');
      const { direct, more } = splitPropertyDefs(defs, expanded);
      const signature = `${o.id}:${o.type}:${expanded ? '2' : '1'}:${direct.map(d=>d.key).join(',')}:${more.map(d=>d.key).join(',')}`;
      els.objectMetrics.classList.remove('property-empty');
      if (forceRebuild || fields.dataset.signature !== signature) {
        fields.innerHTML = '';
        direct.forEach(def => fields.appendChild(buildPropertyField(def, getPropertyValue(o, def.key))));
        if (more.length) fields.appendChild(buildMoreButton(more, o));
        fields.dataset.signature = signature;
        closeMorePopover();
        return;
      }
      direct.forEach(def => {
        const value = getPropertyValue(o, def.key);
        if (def.type === 'swatches') {
          const btn = fields.querySelector(`[data-prop="${def.key}"]`);
          if (btn) {
            btn.dataset.value = value;
            btn.style.background = value;
            btn.title = `当前颜色：${value}`;
          }
          return;
        }
        const input = fields.querySelector(`[data-prop="${def.key}"]`);
        if (input && document.activeElement !== input) input.value = value;
      });
    }

    function applyPropertyInput(input) {
      const o = getSingleSelectedObject();
      if (!o || !input) return;
      const key = input.dataset.prop;
      const raw = input.dataset.value ?? input.value;
      const n = Number(raw);
      if (['length','angle','width','height','lineWidth','wallThickness','fontSize','arrowSize','fillOpacity'].includes(key) && !Number.isFinite(n)) { updateObjectMetrics(true); return; }
      saveHistory();
      if (key === 'length') {
        if (n > 0 && isEditableLineObject(o)) {
          const pixelLength = n / getScaleFactorValue();
          const angle = Math.atan2(o.y2 - o.y1, o.x2 - o.x1);
          o.x2 = o.x1 + Math.cos(angle) * pixelLength;
          o.y2 = o.y1 + Math.sin(angle) * pixelLength;
        }
      } else if (key === 'angle') {
        if (isEditableLineObject(o)) {
          const len = getObjectPixelLength(o);
          // 用户输入角度为逆时针正方向；内部 Canvas 坐标需转换为顺时针视觉角度。
          const rad = -n * Math.PI / 180;
          o.x2 = o.x1 + Math.cos(rad) * len;
          o.y2 = o.y1 + Math.sin(rad) * len;
        }
      } else if (key === 'width' || key === 'height') {
        if (['rect','ellipse'].includes(o.type) && n > 0) {
          if (key === 'width') o.x2 = o.x1 + Math.sign((o.x2 - o.x1) || 1) * n;
          if (key === 'height') o.y2 = o.y1 + Math.sign((o.y2 - o.y1) || 1) * n;
        }
      } else if (key === 'text') {
        o.text = String(raw).trim() || '文字';
      } else if (key === 'color') {
        o.color = raw;
      } else if (key === 'lineWidth') {
        o.lineWidth = Math.max(1, n);
      } else if (key === 'fillOpacity') {
        o.fillOpacity = Math.max(0, Math.min(100, n)) / 100;
      } else if (key === 'wallThickness') {
        o.wallThickness = Math.max(4, n);
      } else if (key === 'wallStyle') {
        o.wallStyle = raw;
      } else if (key === 'openingThicknessMode') {
        o.openingThicknessMode = raw;
        o.openingUseWallThickness = raw === 'wall';
        if (raw === 'wall') o.wallThickness = o.wallThickness || Number(els.wallThickness.value) || 10;
      } else if (key === 'doorSwing') {
        o.doorSwing = raw === 'left' ? 'left' : 'right';
        o.swing = o.doorSwing;
      } else if (key === 'fontSize') {
        o.fontSize = Math.max(8, n);
      } else if (key === 'arrowMode') {
        o.arrowMode = raw;
      } else if (key === 'arrowSize') {
        o.arrowSize = Math.max(4, n);
      } else if (key === 'dimensionLabelMode') {
        o.dimensionLabelMode = ['inline','above','below'].includes(raw) ? raw : 'inline';
      } else if (key === 'layer') {
        o.layer = raw;
      }
      draw();
      updateObjectMetrics();
    }

    function isLayerVisible(obj) { return state.visibleLayers[obj.layer || 'walls'] !== false; }

    function isOpeningObject(obj) {
      return obj && (obj.type === 'door' || obj.type === 'window');
    }

    function usesWallThickness(obj) {
      if (!obj) return false;
      if (obj.openingThicknessMode) return obj.openingThicknessMode === 'wall';
      return !!obj.openingUseWallThickness;
    }


    // v53 统一渲染层：对象只在这里被拆成基础绘图元素。
    // canvas、PNG/JPG、SVG/PDF 都读取同一批 render items，避免以后双渲染逻辑漏改。
    function renderLine(x1, y1, x2, y2, stroke, lineWidth, lineCap = 'round', lineJoin = 'round', extra = {}) {
      return { kind: 'line', x1, y1, x2, y2, stroke, lineWidth, lineCap, lineJoin, ...extra };
    }

    function renderRect(x, y, w, h, fill, stroke = null, lineWidth = 0, extra = {}) {
      return { kind: 'rect', x, y, w, h, fill, stroke, lineWidth, ...extra };
    }

    function renderPolyline(points, stroke, lineWidth, lineCap = 'round', lineJoin = 'round', extra = {}) {
      return { kind: 'polyline', points: points || [], stroke, lineWidth, lineCap, lineJoin, ...extra };
    }

    function renderText(text, x, y, fill, fontSize, extra = {}) {
      return { kind: 'text', text: String(text ?? ''), x, y, fill, fontSize, ...extra };
    }

    function renderPolygon(points, fill, stroke, lineWidth, lineCap = 'round', lineJoin = 'round', extra = {}) {
      return { kind: 'polygon', points: points || [], fill, stroke, lineWidth, lineCap, lineJoin, ...extra };
    }

    function applyPreviewDash(obj, items) {
      if (!obj || !obj.preview) return items;
      return items.map(item => item.stroke ? { ...item, dash: [8, 6] } : item);
    }

    function buildArrowHeadRenderItems(x, y, angle, size, color, width, extra = {}) {
      return [
        renderLine(x, y, x - size * Math.cos(angle - Math.PI / 6), y - size * Math.sin(angle - Math.PI / 6), color, width, 'round', 'round', extra),
        renderLine(x, y, x - size * Math.cos(angle + Math.PI / 6), y - size * Math.sin(angle + Math.PI / 6), color, width, 'round', 'round', extra)
      ];
    }

    function getAreaFillOpacity(o) {
      const raw = Number(o && o.fillOpacity);
      return Number.isFinite(raw) ? Math.max(0, Math.min(1, raw)) : 1;
    }

    function buildAreaRenderItems(o) {
      const points = Array.isArray(o.points) ? o.points : [];
      if (points.length < 3) return [];
      const color = o.color || DEFAULT_AREA_COLOR;
      const width = o.lineWidth || 2;
      return applyPreviewDash(o, [renderPolygon(points, color, color, width, 'round', 'round', { fillOpacity: getAreaFillOpacity(o) })]);
    }

    function getDoorSwing(o) {
      return (o && (o.doorSwing || o.swing) === 'left') ? 'left' : 'right';
    }

    function buildWallRenderItems(o) {
      const dx = o.x2 - o.x1, dy = o.y2 - o.y1;
      const len = Math.hypot(dx, dy);
      if (len < 0.001) return [];
      const color = o.color || '#111827';
      const width = o.lineWidth || 3;
      const thickness = o.wallThickness || 10;
      const nx = -dy / len * (thickness / 2);
      const ny = dx / len * (thickness / 2);
      const isSolid = (o.wallStyle || 'hollow') === 'solid';
      if (isSolid) {
        return applyPreviewDash(o, [{
          kind: 'polygon',
          points: [
            { x: o.x1 + nx, y: o.y1 + ny },
            { x: o.x2 + nx, y: o.y2 + ny },
            { x: o.x2 - nx, y: o.y2 - ny },
            { x: o.x1 - nx, y: o.y1 - ny }
          ],
          fill: color,
          stroke: color,
          lineWidth: width,
          lineJoin: 'round'
        }]);
      }
      return applyPreviewDash(o, [
        renderLine(o.x1 + nx, o.y1 + ny, o.x2 + nx, o.y2 + ny, color, width),
        renderLine(o.x1 - nx, o.y1 - ny, o.x2 - nx, o.y2 - ny, color, width),
        renderLine(o.x1 + nx, o.y1 + ny, o.x1 - nx, o.y1 - ny, color, width),
        renderLine(o.x2 + nx, o.y2 + ny, o.x2 - nx, o.y2 - ny, color, width)
      ]);
    }

    function buildWallJointPatchRenderItems(objects = state.objects) {
      const walls = (objects || []).filter(o => o.type === 'wall' && isLayerVisible(o));
      const threshold = 1.5;
      const clusters = [];
      walls.forEach(w => {
        [{ x: w.x1, y: w.y1, wall: w }, { x: w.x2, y: w.y2, wall: w }].forEach(ep => {
          let cluster = clusters.find(cl => Math.hypot(cl.x - ep.x, cl.y - ep.y) <= threshold);
          if (!cluster) { cluster = { x: ep.x, y: ep.y, items: [] }; clusters.push(cluster); }
          cluster.items.push(ep);
        });
      });
      const items = [];
      clusters.forEach(cl => {
        if (cl.items.length < 2) return;
        const maxT = Math.max(...cl.items.map(i => i.wall.wallThickness || 18));
        const firstWall = cl.items[0].wall;
        const hasSolid = cl.items.some(i => (i.wall.wallStyle || 'hollow') === 'solid');
        const color = firstWall.color || '#111827';
        items.push({
          kind: 'circle',
          cx: cl.x,
          cy: cl.y,
          r: maxT / 2,
          fill: hasSolid ? color : '#ffffff',
          stroke: color,
          lineWidth: Math.max(1, firstWall.lineWidth || 3)
        });
      });
      return items;
    }

    function buildDoorRenderItems(o) {
      const a = Math.atan2(o.y2 - o.y1, o.x2 - o.x1);
      const len = Math.hypot(o.x2 - o.x1, o.y2 - o.y1);
      if (len < 0.001) return [];
      const color = o.color || '#111827';
      const doorLineWidth = o.lineWidth || 2;
      const useWallThickness = usesWallThickness(o);
      const wallThickness = o.wallThickness || Number(els.wallThickness.value) || 10;
      const openingThickness = useWallThickness ? wallThickness : doorLineWidth;
      const cutWidth = useWallThickness
        ? Math.max(wallThickness + doorLineWidth + 4, doorLineWidth + 8)
        : Math.max(doorLineWidth + 3, 5);
      const extend = useWallThickness ? Math.max(4, openingThickness / 2) : 0;
      const wallFaceOffset = useWallThickness ? Math.min(openingThickness / 2, len * 0.35) : 0;
      const arcEndAngle = useWallThickness ? -Math.asin(Math.min(0.35, wallFaceOffset / Math.max(len, 1))) : 0;
      const sealLineWidth = Math.max(doorLineWidth + 1, 3);
      const sealHalf = useWallThickness
        ? openingThickness / 2 + Math.max(2, sealLineWidth * 0.55)
        : Math.max(doorLineWidth / 2 + 1, 2.5);
      const transform = { x: o.x1, y: o.y1, rotation: a };
      const swing = getDoorSwing(o);
      const hingeX = swing === 'right' ? len : 0;
      const leafEndY = -len;
      const arcStart = -Math.PI / 2;
      const arcEnd = swing === 'right' ? Math.PI - arcEndAngle : arcEndAngle;
      const arcAnticlockwise = swing === 'right';
      return applyPreviewDash(o, [
        renderLine(0, 0, len, 0, '#ffffff', cutWidth, 'butt', 'round', { transform }),
        renderRect(-sealLineWidth / 2, -sealHalf, sealLineWidth, sealHalf * 2, color, null, 0, { transform }),
        renderRect(len - sealLineWidth / 2, -sealHalf, sealLineWidth, sealHalf * 2, color, null, 0, { transform }),
        renderLine(hingeX, extend, hingeX, leafEndY, color, doorLineWidth, 'round', 'round', { transform }),
        { kind: 'arc', cx: hingeX, cy: 0, r: len, startAngle: arcStart, endAngle: arcEnd, anticlockwise: arcAnticlockwise, stroke: color, lineWidth: doorLineWidth, lineCap: 'butt', lineJoin: 'round', transform }
      ]);
    }

    function buildWindowRenderItems(o) {
      const a = Math.atan2(o.y2 - o.y1, o.x2 - o.x1);
      const len = Math.hypot(o.x2 - o.x1, o.y2 - o.y1);
      if (len < 0.001) return [];
      const color = o.color || '#111827';
      const windowLineWidth = o.lineWidth || 2;
      const useWallThickness = usesWallThickness(o);
      const wallThickness = o.wallThickness || Number(els.wallThickness.value) || 10;
      const openingThickness = useWallThickness ? wallThickness : Math.max(windowLineWidth + 4, 7);
      const cutWidth = useWallThickness
        ? Math.max(wallThickness + windowLineWidth + 4, windowLineWidth + 8)
        : Math.max(windowLineWidth + 3, 5);
      const sealLineWidth = Math.max(windowLineWidth + 1, 3);
      const sealHalf = useWallThickness
        ? openingThickness / 2 + Math.max(1.5, sealLineWidth * 0.45)
        : Math.max(windowLineWidth / 2 + 3, 4.5);
      const railOffset = useWallThickness
        ? Math.max(4, Math.min(7, openingThickness * 0.25))
        : Math.max(3, Math.min(5, windowLineWidth + 1));
      const transform = { x: o.x1, y: o.y1, rotation: a };
      return applyPreviewDash(o, [
        renderLine(0, 0, len, 0, '#ffffff', cutWidth, 'butt', 'round', { transform }),
        renderRect(-sealLineWidth / 2, -sealHalf, sealLineWidth, sealHalf * 2, color, null, 0, { transform }),
        renderRect(len - sealLineWidth / 2, -sealHalf, sealLineWidth, sealHalf * 2, color, null, 0, { transform }),
        renderLine(0, -railOffset, len, -railOffset, color, windowLineWidth, 'butt', 'round', { transform }),
        renderLine(0, railOffset, len, railOffset, color, windowLineWidth, 'butt', 'round', { transform }),
        renderLine(0, 0, len, 0, color, windowLineWidth, 'butt', 'round', { transform })
      ]);
    }

    function measureRenderTextWidth(text, fontSize) {
      try {
        ctx.save();
        ctx.font = `${fontSize || 20}px ${PDF_TEXT_FONT_FAMILY}`;
        const width = ctx.measureText(String(text ?? '')).width;
        ctx.restore();
        return Number.isFinite(width) ? width : String(text ?? '').length * (fontSize || 20) * 0.56;
      } catch (err) {
        return String(text ?? '').length * (fontSize || 20) * 0.56;
      }
    }

    function getInlineDimensionLabelGap(angle, labelWidth, fontSize) {
      // 压线文字保持水平；这里只计算“标尺中心线穿过文字区域”的实际长度。
      // 比旧的外框投影算法更紧凑，尤其避免 30°/45°/60° 时断口过长。
      const textW = Math.max(1, labelWidth);
      const textH = Math.max(8, fontSize || 20) * 1.08;
      const pad = 6;
      const c = Math.abs(Math.cos(angle));
      const s = Math.abs(Math.sin(angle));
      const halfW = textW / 2;
      const halfH = textH / 2;
      let halfGap;
      if (s < 0.001) halfGap = halfW;
      else if (c < 0.001) halfGap = halfH;
      else halfGap = Math.min(halfW / c, halfH / s);
      return Math.max(18, halfGap * 2 + pad * 2);
    }

    function resolveDimensionLabelMode(mode, lineLength, labelWidth, arrowSize, angle = 0, fontSize = 20) {
      const selected = ['inline','above','below'].includes(mode) ? mode : 'inline';
      if (selected !== 'inline') return selected;
      // 压线模式采用“尺寸线断开避让文字”，需要给文字、两端箭头和安全边距留出空间；长度不足时临时回退到上方。
      const labelGap = getInlineDimensionLabelGap(angle, labelWidth, fontSize);
      const required = labelGap + arrowSize * 2 + 16;
      return lineLength >= required ? 'inline' : 'above';
    }

    function buildDimensionRenderItems(o) {
      const a = Math.atan2(o.y2 - o.y1, o.x2 - o.x1);
      const px = Math.hypot(o.x2 - o.x1, o.y2 - o.y1);
      const arrowSize = o.arrowSize || 10;
      const tick = Math.max(8, arrowSize * 0.8);
      const nx = Math.cos(a + Math.PI / 2) * tick;
      const ny = Math.sin(a + Math.PI / 2) * tick;
      const color = o.color || '#111827';
      const width = o.lineWidth || 2;
      const fontSize = o.fontSize || 20;
      const label = `${formatNumber(px * (Number(els.scaleFactor.value) || 1))} ${els.unitName.value.trim() || 'unit'}`;
      const labelWidth = measureRenderTextWidth(label, fontSize);
      const labelMode = resolveDimensionLabelMode(o.dimensionLabelMode || 'inline', px, labelWidth, arrowSize, a, fontSize);
      const cx = (o.x1 + o.x2) / 2;
      const cy = (o.y1 + o.y2) / 2;
      const items = [];

      if (labelMode === 'inline') {
        // 压线不再使用白色方块遮罩，而是在渲染时把尺寸线中间断开。
        // 标尺对象本身仍是一条线，长度计算和拖拽逻辑不受影响。
        const ux = Math.cos(a);
        const uy = Math.sin(a);
        const gapHalf = getInlineDimensionLabelGap(a, labelWidth, fontSize) / 2;
        const leftEnd = { x: cx - ux * gapHalf, y: cy - uy * gapHalf };
        const rightStart = { x: cx + ux * gapHalf, y: cy + uy * gapHalf };
        items.push(renderLine(o.x1, o.y1, leftEnd.x, leftEnd.y, color, width, 'butt'));
        items.push(renderLine(rightStart.x, rightStart.y, o.x2, o.y2, color, width, 'butt'));
        items.push(renderLine(o.x1 - nx, o.y1 - ny, o.x1 + nx, o.y1 + ny, color, width));
        items.push(renderLine(o.x2 - nx, o.y2 - ny, o.x2 + nx, o.y2 + ny, color, width));
        items.push(...buildArrowHeadRenderItems(o.x1, o.y1, a + Math.PI, arrowSize, color, width));
        items.push(...buildArrowHeadRenderItems(o.x2, o.y2, a, arrowSize, color, width));
        items.push(renderText(label, cx, cy, color, fontSize, { textAlign: 'center', textBaseline: 'middle' }));
      } else {
        items.push(renderLine(o.x1, o.y1, o.x2, o.y2, color, width));
        items.push(renderLine(o.x1 - nx, o.y1 - ny, o.x1 + nx, o.y1 + ny, color, width));
        items.push(renderLine(o.x2 - nx, o.y2 - ny, o.x2 + nx, o.y2 + ny, color, width));
        items.push(...buildArrowHeadRenderItems(o.x1, o.y1, a + Math.PI, arrowSize, color, width));
        items.push(...buildArrowHeadRenderItems(o.x2, o.y2, a, arrowSize, color, width));
      }

      if (labelMode === 'below') {
        items.push(renderText(label, 0, 6, color, fontSize, { transform: { x: cx, y: cy, rotation: a }, textAlign: 'center', textBaseline: 'top' }));
      } else if (labelMode === 'above') {
        items.push(renderText(label, 0, -6, color, fontSize, { transform: { x: cx, y: cy, rotation: a }, textAlign: 'center', textBaseline: 'bottom' }));
      }
      return applyPreviewDash(o, items);
    }

    function buildObjectRenderItems(o) {
      if (!o) return [];
      const color = o.color || '#111827';
      const width = o.lineWidth || 2;
      let items = [];
      if (o.type === 'area') items = buildAreaRenderItems(o);
      else if (o.type === 'wall') items = buildWallRenderItems(o);
      else if (o.type === 'line') items = [renderLine(o.x1, o.y1, o.x2, o.y2, color, width)];
      else if (o.type === 'arrow') {
        const a = Math.atan2(o.y2 - o.y1, o.x2 - o.x1);
        const s = o.arrowSize || 14;
        items = [renderLine(o.x1, o.y1, o.x2, o.y2, color, width), ...buildArrowHeadRenderItems(o.x2, o.y2, a, s, color, width)];
        if ((o.arrowMode || 'end') === 'both') items.push(...buildArrowHeadRenderItems(o.x1, o.y1, a + Math.PI, s, color, width));
      } else if (o.type === 'rect') {
        const b = getObjectBox(o);
        items = [renderRect(b.x, b.y, b.w, b.h, null, color, width)];
      } else if (o.type === 'ellipse') {
        const b = getObjectBox(o);
        items = [{ kind: 'ellipse', cx: b.x + b.w / 2, cy: b.y + b.h / 2, rx: Math.abs(b.w / 2), ry: Math.abs(b.h / 2), fill: null, stroke: color, lineWidth: width }];
      } else if (o.type === 'dimension') items = buildDimensionRenderItems(o);
      else if (o.type === 'text') items = [renderText(o.text || '文字', o.x, o.y, color, o.fontSize || 20, { textAlign: 'start', textBaseline: 'top' })];
      else if (o.type === 'door') items = buildDoorRenderItems(o);
      else if (o.type === 'window') items = buildWindowRenderItems(o);
      else if (o.type === 'erase') items = [renderPolyline(o.points || [], '#ffffff', o.width || 22)];
      return applyPreviewDash(o, items);
    }

    function buildRenderItems(objects = state.objects) {
      const list = objects || [];
      const items = [];
      list.forEach(o => { if (isLayerVisible(o) && o.type === 'area') items.push(...buildObjectRenderItems(o)); });
      list.forEach(o => { if (isLayerVisible(o) && (o.type === 'wall' || o.type === 'line')) items.push(...buildObjectRenderItems(o)); });
      items.push(...buildWallJointPatchRenderItems(list));
      list.forEach(o => { if (isLayerVisible(o) && ['rect', 'ellipse', 'erase'].includes(o.type)) items.push(...buildObjectRenderItems(o)); });
      list.forEach(o => { if (isLayerVisible(o) && isOpeningObject(o)) items.push(...buildObjectRenderItems(o)); });
      list.forEach(o => { if (isLayerVisible(o) && ['arrow', 'dimension'].includes(o.type)) items.push(...buildObjectRenderItems(o)); });
      list.forEach(o => { if (isLayerVisible(o) && o.type === 'text') items.push(...buildObjectRenderItems(o)); });
      return items;
    }

    function applyCanvasRenderTransform(c, item) {
      if (!item.transform) return false;
      c.save();
      c.translate(item.transform.x || 0, item.transform.y || 0);
      if (item.transform.rotation) c.rotate(item.transform.rotation);
      return true;
    }

    function applyCanvasStrokeStyle(c, item) {
      c.strokeStyle = item.stroke || '#111827';
      c.lineWidth = item.lineWidth || 1;
      c.lineCap = item.lineCap || 'round';
      c.lineJoin = item.lineJoin || 'round';
      c.setLineDash(item.dash || []);
    }

    function getRenderFillOpacity(item) {
      const raw = Number(item && item.fillOpacity);
      return Number.isFinite(raw) ? Math.max(0, Math.min(1, raw)) : 1;
    }

    function getRenderOpacity(item) {
      const raw = Number(item && item.opacity);
      return Number.isFinite(raw) ? Math.max(0, Math.min(1, raw)) : 1;
    }

    function drawCanvasRenderItem(c, item) {
      if (!item) return;
      const transformed = applyCanvasRenderTransform(c, item);
      if (item.kind === 'line') {
        c.beginPath();
        applyCanvasStrokeStyle(c, item);
        c.moveTo(item.x1, item.y1);
        c.lineTo(item.x2, item.y2);
        c.stroke();
      } else if (item.kind === 'polyline') {
        if (!item.points || item.points.length < 2) { if (transformed) c.restore(); return; }
        c.beginPath();
        applyCanvasStrokeStyle(c, item);
        item.points.forEach((p, i) => i ? c.lineTo(p.x, p.y) : c.moveTo(p.x, p.y));
        c.stroke();
      } else if (item.kind === 'rect') {
        if (item.fill) { c.save(); c.globalAlpha *= getRenderFillOpacity(item); c.fillStyle = item.fill; c.fillRect(item.x, item.y, item.w, item.h); c.restore(); }
        if (item.stroke) { applyCanvasStrokeStyle(c, item); c.strokeRect(item.x, item.y, item.w, item.h); }
      } else if (item.kind === 'ellipse') {
        c.beginPath();
        c.ellipse(item.cx, item.cy, Math.abs(item.rx), Math.abs(item.ry), 0, 0, Math.PI * 2);
        if (item.fill) { c.save(); c.globalAlpha *= getRenderFillOpacity(item); c.fillStyle = item.fill; c.fill(); c.restore(); }
        if (item.stroke) { applyCanvasStrokeStyle(c, item); c.stroke(); }
      } else if (item.kind === 'circle') {
        c.beginPath();
        c.arc(item.cx, item.cy, Math.max(0, item.r), 0, Math.PI * 2);
        if (item.fill) { c.save(); c.globalAlpha *= getRenderFillOpacity(item); c.fillStyle = item.fill; c.fill(); c.restore(); }
        if (item.stroke) { applyCanvasStrokeStyle(c, item); c.stroke(); }
      } else if (item.kind === 'polygon') {
        if (!item.points || item.points.length < 2) { if (transformed) c.restore(); return; }
        const hasWholeOpacity = item.opacity !== undefined;
        if (hasWholeOpacity) { c.save(); c.globalAlpha *= getRenderOpacity(item); }
        c.beginPath();
        item.points.forEach((p, i) => i ? c.lineTo(p.x, p.y) : c.moveTo(p.x, p.y));
        c.closePath();
        if (item.fill) {
          if (!hasWholeOpacity && item.fillOpacity !== undefined) {
            c.save(); c.globalAlpha *= getRenderFillOpacity(item); c.fillStyle = item.fill; c.fill(); c.restore();
          } else {
            c.fillStyle = item.fill; c.fill();
          }
        }
        if (item.stroke) { applyCanvasStrokeStyle(c, item); c.stroke(); }
        if (hasWholeOpacity) c.restore();
      } else if (item.kind === 'arc') {
        c.beginPath();
        applyCanvasStrokeStyle(c, item);
        c.arc(item.cx, item.cy, Math.max(0, item.r), item.startAngle, item.endAngle, !!item.anticlockwise);
        c.stroke();
      } else if (item.kind === 'text') {
        c.fillStyle = item.fill || '#111827';
        c.font = `${item.fontSize || 20}px ${PDF_TEXT_FONT_FAMILY}`;
        c.textAlign = item.textAlign || 'start';
        c.textBaseline = item.textBaseline || 'top';
        c.fillText(item.text || '', item.x || 0, item.y || 0);
      }
      if (transformed) c.restore();
      c.setLineDash([]);
    }

    function drawCanvasRenderItems(c, items) {
      (items || []).forEach(item => drawCanvasRenderItem(c, item));
    }

    function svgTransformAttr(item) {
      if (!item.transform) return '';
      const x = svgNum(item.transform.x || 0);
      const y = svgNum(item.transform.y || 0);
      const deg = svgNum((item.transform.rotation || 0) * 180 / Math.PI);
      return ` transform="translate(${x} ${y}) rotate(${deg})"`;
    }

    function svgDashAttr(item) {
      return item.dash ? ` stroke-dasharray="${item.dash.map(svgNum).join(' ')}"` : '';
    }

    function svgTextAnchor(value) {
      if (value === 'center') return 'middle';
      if (value === 'right' || value === 'end') return 'end';
      return 'start';
    }

    function svgTextBaseline(value) {
      if (value === 'bottom') return 'text-after-edge';
      if (value === 'middle') return 'central';
      return 'text-before-edge';
    }

    function renderItemToSvg(item) {
      if (!item) return '';
      const transform = svgTransformAttr(item);
      const dash = svgDashAttr(item);
      const opacityAttr = item.opacity !== undefined ? ` opacity="${svgNum(getRenderOpacity(item))}"` : '';
      const strokeBase = item.stroke ? `stroke="${escapeSvg(item.stroke)}" stroke-width="${svgNum(item.lineWidth || 1)}" stroke-linecap="${item.lineCap || 'round'}" stroke-linejoin="${item.lineJoin || 'round'}"${dash}` : 'stroke="none"';
      const fillOpacityAttr = item.fill && item.fillOpacity !== undefined ? ` fill-opacity="${svgNum(getRenderFillOpacity(item))}"` : '';
      const fillBase = item.fill ? `fill="${escapeSvg(item.fill)}"${fillOpacityAttr}` : 'fill="none"';
      if (item.kind === 'line') return `<line x1="${svgNum(item.x1)}" y1="${svgNum(item.y1)}" x2="${svgNum(item.x2)}" y2="${svgNum(item.y2)}" ${strokeBase} ${fillBase}${transform} />`;
      if (item.kind === 'polyline') {
        const points = (item.points || []).map(p => `${svgNum(p.x)},${svgNum(p.y)}`).join(' ');
        if (!points) return '';
        return `<polyline points="${points}" ${strokeBase} ${fillBase}${transform} />`;
      }
      if (item.kind === 'rect') return `<rect x="${svgNum(item.x)}" y="${svgNum(item.y)}" width="${svgNum(item.w)}" height="${svgNum(item.h)}" ${fillBase} ${strokeBase}${transform} />`;
      if (item.kind === 'ellipse') return `<ellipse cx="${svgNum(item.cx)}" cy="${svgNum(item.cy)}" rx="${svgNum(Math.abs(item.rx))}" ry="${svgNum(Math.abs(item.ry))}" ${fillBase} ${strokeBase}${transform} />`;
      if (item.kind === 'circle') return `<circle cx="${svgNum(item.cx)}" cy="${svgNum(item.cy)}" r="${svgNum(Math.max(0, item.r))}" ${fillBase} ${strokeBase}${transform} />`;
      if (item.kind === 'polygon') {
        const points = (item.points || []).map(p => `${svgNum(p.x)},${svgNum(p.y)}`).join(' ');
        if (!points) return '';
        return `<polygon points="${points}" ${fillBase} ${strokeBase}${opacityAttr}${transform} />`;
      }
      if (item.kind === 'arc') {
        const startX = item.cx + Math.cos(item.startAngle) * item.r;
        const startY = item.cy + Math.sin(item.startAngle) * item.r;
        const endX = item.cx + Math.cos(item.endAngle) * item.r;
        const endY = item.cy + Math.sin(item.endAngle) * item.r;
        let delta = item.endAngle - item.startAngle;
        if (!item.anticlockwise && delta < 0) delta += Math.PI * 2;
        if (item.anticlockwise && delta > 0) delta -= Math.PI * 2;
